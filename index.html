function InlineCMapReaderFactory(params) {}

  var name = params.name + '.bcmap';
  var b64 = INLINE_CMAPS[name];
  if (b64) {
    var bin = atob(b64);
    var arr = new Uint8Array(bin.length);
    for (var i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);

<script>
// PIPE QMS

// ════ _header_comment ════
// PIPE QMS - Pipeline Quality Management System
// Pure React.createElement (no JSX/Babel needed)

(function() {

// ════ welder_initial_data ════
// 용접사 초기 데이터 — 빌드 시 비워둠 (런타임에 localStorage에서 로드)
var WELDER_INITIAL_DATA = [];

// ════ _prefix_tail ════
// ════════════════════════════════════════════════════════════════════════
// 구글 시트 기반 인증 + 데이터 동기화 + 이력관리
// ════════════════════════════════════════════════════════════════════════

// ── 구글 시트 API 헬퍼 ──────────────────────────────────────────────────

// ════ globals ════
var C = {
  navy:   '#0A1628',
  navyL:  '#0F2042',
  steel:  '#1A3060',
  blue:   '#1E5FAA',
  blueL:  '#2E7BE0',
  cyan:   '#00C8E0',
  gold:   '#F0A500',
  green:  '#00C97A',
  red:    '#FF4E5B',
  orange: '#FF8C00',
  white:  '#F0F4FF',
  gray:   '#6B7FA3',
  grayL:  '#A8B8D8',
  border: '#1E3060'
};

// ════ gs ════
var GS = {
  _url: '',

  setUrl: function(u) {
    GS._url = u.trim();
    try { localStorage.setItem('qms_gs_url', u.trim()); } catch(e) {}
  },
  getUrl: function() {
    if (!GS._url) {
      try { GS._url = localStorage.getItem('qms_gs_url') || ''; } catch(e) {}
    }
    return GS._url;
  },

  get: function(action, params) {
    var url = GS.getUrl() + '?action=' + action;
    if (params) Object.keys(params).forEach(function(k) {
      url += '&' + k + '=' + encodeURIComponent(params[k]);
    });
    return fetch(url).then(function(r) { return r.json(); });
  },

  // POST — https에서는 JSON body, file://에서는 GET 폴백
  post: function(payload) {
    var isFile = window.location.protocol === 'file:';
    if (!isFile) {
      return fetch(GS.getUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      }).then(function(r) { return r.json(); });
    }
    // file:// — GET 폴백 (data/snapshot은 별도 파라미터)
    var url = GS.getUrl() + '?action=' + encodeURIComponent(payload.action || '');
    var skip = ['action','data','snapshot','entry','user'];
    Object.keys(payload).forEach(function(k) {
      if (skip.indexOf(k) < 0) {
        url += '&' + k + '=' + encodeURIComponent(String(payload[k] !== undefined ? payload[k] : ''));
      }
    });
    if (payload.user)     Object.keys(payload.user).forEach(function(k) {
      var v = payload.user[k];
      if (k === 'password') { url += '&pw=' + encodeURIComponent(String(v||'')); return; }
      url += '&' + k + '=' + encodeURIComponent(String(v !== undefined ? v : ''));
    });
    if (payload.entry)    Object.keys(payload.entry).forEach(function(k) {
      url += '&' + k + '=' + encodeURIComponent(String(payload.entry[k] !== undefined ? payload.entry[k] : ''));
    });
    if (payload.data)     url += '&dataJson='  + encodeURIComponent(JSON.stringify(payload.data));
    if (payload.snapshot) url += '&snapJson='  + encodeURIComponent(JSON.stringify(payload.snapshot));
    return fetch(url).then(function(r) { return r.json(); });
  },

  // ── 청크 단위 데이터 저장 (대용량 대응)
  // Apps Script는 한 번에 최대 ~2000행 처리 권장
  saveChunked: function(data, onProgress) {
    var CHUNK = 1500;
    var chunks = [];
    for (var i = 0; i < data.length; i += CHUNK) {
      chunks.push(data.slice(i, i + CHUNK));
    }
    var total = chunks.length;

    // 첫 청크는 replace, 나머지는 append
    function sendChunk(idx) {
      if (idx >= chunks.length) return Promise.resolve({ ok: true, count: data.length });
      var isFirst = idx === 0;
      if (onProgress) onProgress(idx + 1, total);
      return GS.post({
        action: isFirst ? 'saveWeldLog' : 'appendWeldLog',
        data: chunks[idx]
      }).then(function(r) {
        if (!r.ok) return Promise.reject(new Error(r.error || '저장 실패'));
        return sendChunk(idx + 1);
      });
    }
    return sendChunk(0);
  },

  // ── 청크 단위 데이터 로드
  loadChunked: function(onProgress) {
    var CHUNK = 1500;
    var all = [];

    function loadPage(offset) {
      return GS.get('getWeldLog', { limit: CHUNK, offset: offset }).then(function(r) {
        if (!r.ok) return Promise.reject(new Error(r.error || '로드 실패'));
        var rows = r.data || [];
        all = all.concat(rows);
        if (onProgress) onProgress(all.length);
        if (rows.length === CHUNK) {
          // 더 있을 수 있음
          return loadPage(offset + CHUNK);
        }
        return all;
      });
    }
    return loadPage(0);
  }
};

// ── 로컬 오프라인 캐시 ──────────────────────────────────────────────────
var CACHE = {
  get:   function(k) { try { return JSON.parse(localStorage.getItem('qms_cache_'+k)||'null'); } catch(e) { return null; } },
  set:   function(k,v) { try { localStorage.setItem('qms_cache_'+k, JSON.stringify(v)); } catch(e) {} },
  clear: function(k) { try { localStorage.removeItem('qms_cache_'+k); } catch(e) {} }
};

// ── 수정 이력 기록 ──────────────────────────────────────────────────────
function gsRecordAudit(user, action, targetId, fieldName, oldVal, newVal) {
  var entry = {
    userId:    user ? user.id   : 'unknown',
    userName:  user ? user.name : '알 수 없음',
    action:    action,
    targetId:  String(targetId || ''),
    fieldName: fieldName || '',
    oldValue:  String((oldVal != null ? oldVal : '')),
    newValue:  String((newVal != null ? newVal : '')),
    created_at: new Date().toISOString()
  };
  var log = CACHE.get('audit') || [];
  log.unshift(Object.assign({ id: Date.now() + Math.random() }, entry));
  if (log.length > 500) log = log.slice(0, 500);
  CACHE.set('audit', log);
  if (GS.getUrl()) {
    GS.post({ action: 'recordAudit', entry: entry }).catch(function(){});
  }
}

// ── 스냅샷 저장 ──────────────────────────────────────────────────────────
function gsSaveSnapshot(user, data, label) {
  var snap = {
    userId:    user ? user.id   : 'unknown',
    userName:  user ? user.name : '알 수 없음',
    label:     label || ('수동 백업 — ' + new Date().toLocaleString('ko-KR')),
    count:     data.length,
    data:      data,
    created_at: new Date().toISOString()
  };
  var snaps = CACHE.get('snapshots') || [];
  snaps.unshift(Object.assign({ id: Date.now() }, snap));
  if (snaps.length > 30) snaps = snaps.slice(0, 30);
  CACHE.set('snapshots', snaps);
  if (GS.getUrl()) {
    GS.post({ action: 'saveSnapshot', snapshot: snap }).catch(function(){});
  }
  return snaps[0];
}

// GSheetPanel — 구글 시트 연동 관리 (저장/불러오기/동기화)
// ════════════════════════════════════════════════════════════════════════
function GSheetPanel(props) {
  var data    = props.data    || [];
  var setData = props.setData || function(){};

  var st  = useState('idle');  var syncSt  = st[0];  var setSyncSt  = st[1];
  var msg = useState('');      var syncMsg = msg[0]; var setSyncMsg = msg[1];
  var pg  = useState(null);    var progress= pg[0];  var setProgress= pg[1];

  function statusColor() {
    return syncSt==='ok'?C.green:syncSt==='error'?C.red:syncSt==='loading'?C.gold:C.gray;
  }

  // ── 구글 시트에서 불러오기 (청크 단위)
  function loadFromSheet() {
    if (!GS.getUrl()) { setSyncMsg('❌ URL이 설정되지 않았습니다'); setSyncSt('error'); return; }
    setSyncSt('loading'); setSyncMsg('📥 구글 시트에서 불러오는 중...'); setProgress(0);

    GS.loadChunked(function(loaded) {
      setSyncMsg('📥 불러오는 중... ' + loaded + '건');
      setProgress(loaded);
    }).then(function(rows) {
      if (!rows || rows.length === 0) {
        setSyncMsg('⚠ 데이터가 없습니다 (시트가 비어있거나 헤더가 없습니다)');
        setSyncSt('error'); setProgress(null); return;
      }
      // 숫자 타입 복원
      var parsed = rows.map(function(row) {
        var n = Object.assign({}, row);
        ['size','sch','thick','operP','operT','desP','desT','testP','insulThk'].forEach(function(f) {
          if (n[f] !== '' && n[f] !== null && n[f] !== undefined) {
            var num = Number(n[f]);
            if (!isNaN(num)) n[f] = num;
          }
        });
        return n;
      });
      setData(parsed);
      setSyncSt('ok');
      setSyncMsg('✅ ' + parsed.length + '건 불러오기 완료');
      setProgress(null);
    }).catch(function(e) {
      setSyncSt('error');
      setSyncMsg('❌ 불러오기 실패: ' + e.message);
      setProgress(null);
    });
  }

  // ── 구글 시트에 저장 (청크 단위)
  function saveToSheet() {
    if (!GS.getUrl()) { setSyncMsg('❌ URL이 설정되지 않았습니다'); setSyncSt('error'); return; }
    if (!data.length) { setSyncMsg('⚠ 저장할 데이터가 없습니다'); return; }
    setSyncSt('loading'); setSyncMsg('📤 저장 중... (0/' + Math.ceil(data.length/1500) + ')'); setProgress(0);

    GS.saveChunked(data, function(chunk, total) {
      setSyncMsg('📤 저장 중... (' + chunk + '/' + total + ' 청크)');
      setProgress(chunk / total * 100);
    }).then(function() {
      setSyncSt('ok');
      setSyncMsg('✅ ' + data.length + '건 저장 완료');
      setProgress(null);
    }).catch(function(e) {
      setSyncSt('error');
      setSyncMsg('❌ 저장 실패: ' + e.message +
        '\n→ Apps Script에 appendWeldLog action이 없으면 헤더 초기화 후 다시 시도하세요');
      setProgress(null);
    });
  }

  // ── 연결 상태 확인
  var connected = !!GS.getUrl();
  var sc = statusColor();

  return h('div', { className:'fade' },
    h('div', { style:{ display:'flex', alignItems:'center', gap:12, marginBottom:20 } },
      h('div', { style:{ fontSize:17, fontWeight:700, color:C.white } }, '🔗 구글 시트 연동'),
      h('div', { style:{
        padding:'4px 12px', borderRadius:20, fontSize:11, fontWeight:700,
        background: connected ? C.green+'25' : C.red+'25',
        color: connected ? C.green : C.red,
        border: '1px solid ' + (connected ? C.green : C.red) + '50'
      }}, connected ? '✅ 연결됨' : '❌ 미연결')
    ),

    !connected && h('div', { style:{ padding:'14px 18px', background:C.orange+'15',
      border:'1px solid '+C.orange+'40', borderRadius:10, marginBottom:16,
      fontSize:12, color:C.orange } },
      '⚠ 구글 시트 URL이 설정되지 않았습니다. 앱을 재시작하고 URL을 먼저 설정하세요.'
    ),

    // 현재 URL 표시
    connected && h('div', { style:{ padding:'10px 14px', background:C.navyL,
      borderRadius:8, border:'1px solid '+C.border, marginBottom:16,
      fontSize:11, color:C.gray, wordBreak:'break-all' } },
      '📌 ', GS.getUrl().slice(0, 60) + (GS.getUrl().length > 60 ? '...' : '')
    ),

    // 상태 메시지
    syncMsg && h('div', { style:{
      padding:'10px 14px', borderRadius:8, marginBottom:14,
      background: sc+'18', border:'1px solid '+sc+'50',
      color: sc, fontSize:12, whiteSpace:'pre-wrap'
    }}, syncMsg),

    // 프로그레스 바
    progress !== null && h('div', { style:{ marginBottom:14 } },
      h('div', { style:{ height:6, background:C.border, borderRadius:3, overflow:'hidden' } },
        h('div', { style:{
          height:'100%', background:C.blueL, borderRadius:3,
          width: (typeof progress === 'number' ? progress : 50) + '%',
          transition:'width .3s'
        }})
      )
    ),

    // 액션 버튼
    h('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 } },
      h('button', { onClick:loadFromSheet, disabled:!connected||syncSt==='loading',
        style:{ padding:'14px', borderRadius:10, fontWeight:700, fontSize:14,
          background: connected&&syncSt!=='loading'
            ? 'linear-gradient(90deg,'+C.blue+','+C.blueL+')'
            : C.border,
          border:'none', color: connected&&syncSt!=='loading' ? '#fff' : C.gray,
          cursor: connected&&syncSt!=='loading' ? 'pointer' : 'not-allowed' } },
        syncSt==='loading' ? '⟳ 처리 중...' : '📥 시트에서 불러오기'
      ),
      h('button', { onClick:saveToSheet, disabled:!connected||syncSt==='loading'||!data.length,
        style:{ padding:'14px', borderRadius:10, fontWeight:700, fontSize:14,
          background: connected&&data.length&&syncSt!=='loading'
            ? 'linear-gradient(90deg,#16A34A,#22C55E)'
            : C.border,
          border:'none',
          color: connected&&data.length&&syncSt!=='loading' ? '#fff' : C.gray,
          cursor: connected&&data.length&&syncSt!=='loading' ? 'pointer' : 'not-allowed' } },
        syncSt==='loading' ? '⟳ 처리 중...' : '📤 시트에 저장 (' + data.length + '건)'
      )
    ),

    // 안내
    h('div', { style:{ padding:'12px 16px', background:C.navyL, borderRadius:10,
      border:'1px solid '+C.border, fontSize:11, color:C.gray, lineHeight:1.8 } },
      h('div', { style:{ fontWeight:700, color:C.grayL, marginBottom:6 } }, '📖 사용 방법'),
      h('div', null, '1. 로그인 전 설정 화면에서 Apps Script URL 입력'),
      h('div', null, '2. 📥 불러오기: 구글 시트의 weld_log 시트 → 앱으로 (청크 단위, 대용량 지원)'),
      h('div', null, '3. 📤 저장: 앱 데이터 → 구글 시트로 동기화 (기존 데이터 전체 교체)'),
      h('div', null, '4. 엑셀 업로드 후 저장하면 구글 시트도 자동 갱신됨'),
      h('div', { style:{ marginTop:8, color:C.orange } },
        '⚠ Apps Script에 appendWeldLog 액션을 추가해야 청크 저장이 정상 작동합니다')
    )
  );
}

// LoginScreen
// ════════════════════════════════════════════════════════════════════════
function LoginScreen(props) {
  var onLogin = props.onLogin;
  var onSetup = props.onSetup;

  var idSt = useState('');   var userId   = idSt[0]; var setUserId   = idSt[1];
  var pwSt = useState('');   var password = pwSt[0]; var setPassword = pwSt[1];
  var errSt= useState('');   var err      = errSt[0];var setErr      = errSt[1];
  var ldSt = useState(false);var loading  = ldSt[0]; var setLoading  = ldSt[1];

  var hasUrl = !!GS.getUrl();

  function doLogin() {
    if (!userId.trim()) { setErr('아이디를 입력하세요'); return; }
    if (!password)      { setErr('비밀번호를 입력하세요'); return; }
    setLoading(true); setErr('');

    if (!hasUrl) {
      // 오프라인: 로컬 임시 계정
      setTimeout(function() {
        onLogin({ id: userId.trim(), name: userId.trim(), role: 'admin' });
        setLoading(false);
      }, 300);
      return;
    }

    GS.post({ action: 'login', user: { id: userId.trim(), password: password } })
      .then(function(r) {
        if (r.ok && r.data) {
          onLogin(r.data);
        } else {
          setErr(r.error || '아이디 또는 비밀번호가 올바르지 않습니다');
        }
        setLoading(false);
      })
      .catch(function(e) {
        setErr('연결 오류: ' + e.message);
        setLoading(false);
      });
  }

  function onKey(e) { if (e.key === 'Enter') doLogin(); }

  var boxS = {
    background: C.navyL, border: '1px solid ' + C.border,
    borderRadius: 16, padding: 32, boxShadow: '0 20px 60px #00000060'
  };
  var inp = {
    background: C.navy, border: '1px solid ' + C.border,
    borderRadius: 8, color: C.white, fontSize: 13,
    padding: '11px 14px', width: '100%'
  };

  return h('div', {
    style: {
      minHeight: '100vh', display: 'flex',
      alignItems: 'center', justifyContent: 'center',
      background: 'linear-gradient(135deg,' + C.navy + ' 0%,#0D1F3C 60%,#0A2840 100%)'
    }
  },
    h('div', { style: { width: '100%', maxWidth: 400 } },

      // 로고
      h('div', { style: { textAlign: 'center', marginBottom: 32 } },
        h('div', { style: {
          width: 64, height: 64, borderRadius: 16, margin: '0 auto 14px',
          background: 'linear-gradient(135deg,' + C.blue + ',' + C.cyan + ')',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 32, boxShadow: '0 0 32px ' + C.cyan + '40'
        }}, '⬡'),
        h('div', { style: { fontSize: 26, fontWeight: 800, color: C.white, marginBottom: 4 } },
          'PIPE', h('span', { style: { color: C.cyan } }, 'QMS')),
        h('div', { style: { fontSize: 12, color: C.gray, letterSpacing: '.1em' } },
          'PIPELINE QUALITY MANAGEMENT')
      ),

      // 폼
      h('div', { style: boxS },
        !hasUrl && h('div', { style: {
          padding: '8px 12px', marginBottom: 16, borderRadius: 8,
          background: C.gold + '20', border: '1px solid ' + C.gold + '40',
          fontSize: 11, color: C.gold
        }}, '⚠ 오프라인 모드 — 구글 시트 미연결 (데이터는 로컬에만 저장)'),

        h('div', { style: { marginBottom: 14 } },
          h('div', { style: { fontSize: 11, color: C.grayL, marginBottom: 5, fontWeight: 600 } }, '사번 / 아이디'),
          h('input', {
            type: 'text', value: userId, autoFocus: true,
            onChange: function(e) { setUserId(e.target.value); },
            onKeyDown: onKey,
            placeholder: hasUrl ? '사번 또는 아이디 입력' : '아무 이름 입력',
            style: inp
          })
        ),

        h('div', { style: { marginBottom: 20 } },
          h('div', { style: { fontSize: 11, color: C.grayL, marginBottom: 5, fontWeight: 600 } }, '비밀번호'),
          h('input', {
            type: 'password', value: password,
            onChange: function(e) { setPassword(e.target.value); },
            onKeyDown: onKey,
            placeholder: hasUrl ? '비밀번호 입력' : '아무 값 입력',
            style: inp
          })
        ),

        err && h('div', { style: {
          padding: '9px 12px', marginBottom: 14, borderRadius: 7,
          background: C.red + '18', border: '1px solid ' + C.red + '40',
          color: C.red, fontSize: 12
        }}, err),

        h('button', {
          onClick: doLogin, disabled: loading,
          style: {
            width: '100%', padding: 13, borderRadius: 9,
            fontSize: 14, fontWeight: 700, cursor: 'pointer', border: 'none',
            background: loading
              ? C.border
              : 'linear-gradient(90deg,' + C.blue + ',' + C.blueL + ')',
            color: loading ? C.gray : '#fff',
            marginBottom: 12
          }
        }, loading ? '로그인 중...' : '로그인'),

        h('button', {
          onClick: onSetup,
          style: {
            width: '100%', padding: 10, borderRadius: 8,
            fontSize: 12, cursor: 'pointer',
            background: 'none', border: '1px solid ' + C.border, color: C.grayL
          }
        }, '⚙ 구글 시트 URL 변경')
      )
    )
  );
}

// ════ audit ════
function AuditPanel(props) {
  var currentUser = props.currentUser;
  var data        = props.data;
  var setData     = props.setData;

  var tv = useState('audit'); var tabV  = tv[0]; var setTabV  = tv[1];
  var lg = useState([]);      var log   = lg[0]; var setLog   = lg[1];
  var sn = useState([]);      var snaps = sn[0]; var setSnaps = sn[1];
  var ms = useState('');      var msg   = ms[0]; var setMsg   = ms[1];
  var mc = useState(C.green); var mc2   = mc[0]; var setMc    = mc[1];
  var ld = useState(false);   var loading= ld[0];var setLoading=ld[1];

  function loadLog() {
    // 로컬 캐시 우선
    var localLog = CACHE.get('audit') || [];
    setLog(localLog);
    // 구글 시트에서도 조회
    if (GS.getUrl()) {
      GS.get('getAuditLog').then(function(r){ if(r.ok&&r.data.length>0) setLog(r.data); });
    }
  }
  function loadSnaps() {
    var localSnaps = CACHE.get('snapshots') || [];
    setSnaps(localSnaps);
    if (GS.getUrl()) {
      GS.get('getSnapshots').then(function(r){ if(r.ok) setSnaps(r.data); });
    }
  }

  React.useEffect(function() { loadLog(); loadSnaps(); }, []);

  function showMsg(m,ok2){setMsg(m);setMc(ok2?C.green:C.red);setTimeout(function(){setMsg('');},3000);}

  function doSnapshot() {
    var label = prompt('백업 이름','') || '';
    var snap = gsSaveSnapshot(currentUser, data, label||undefined);
    loadSnaps();
    showMsg('✅ 백업 저장 완료',true);
  }

  function doRestore(snap) {
    if (!confirm('⚠ "'+snap.label+'" 상태로 복구?\n\n현재 '+data.length+'건 → 복구 '+snap.count+'건\n복구 전 자동 백업합니다.')) return;
    setLoading(true);
    // 스냅샷 data 가져오기 (로컬에 있으면 바로, 없으면 서버에서)
    var localSnaps = CACHE.get('snapshots')||[];
    var localFound = localSnaps.find(function(s){return String(s.id)===String(snap.id);});
    if (localFound && localFound.data) {
      applyRestore(localFound.data, snap);
      setLoading(false);
    } else if (GS.getUrl()) {
      GS.get('getSnapshot',{id:snap.id}).then(function(r){
        if(r.ok) applyRestore(r.data, snap);
        else showMsg('복구 데이터 로드 실패: '+r.error,false);
        setLoading(false);
      });
    } else {
      showMsg('복구 데이터를 찾을 수 없습니다',false);
      setLoading(false);
    }
  }

  function applyRestore(restoreData, snap) {
    gsSaveSnapshot(currentUser, data, '복구 전 자동 백업');
    gsRecordAudit(currentUser,'restore',null,null,data.length+'건',snap.count+'건');
    setData(restoreData.map(function(r){return Object.assign({},r);}));
    loadSnaps();
    showMsg('✅ "'+snap.label+'" 으로 복구 완료',true);
  }

  function deleteSnap(snap) {
    if (!confirm('이 백업을 삭제?')) return;
    var next = (CACHE.get('snapshots')||[]).filter(function(s){return String(s.id)!==String(snap.id);});
    CACHE.set('snapshots',next);
    setSnaps(next);
    showMsg('삭제 완료',true);
  }

  function clearLog() {
    if (currentUser.role!=='admin'){showMsg('관리자만 가능',false);return;}
    if (!confirm('수정 이력 전체 삭제?')) return;
    CACHE.set('audit',[]);
    setLog([]);
    showMsg('초기화 완료',true);
  }

  var ACT={edit_cell:'셀 수정',bulk_edit:'다중 수정',add_row:'행 추가',
    delete_row:'행 삭제',import:'가져오기',restore:'데이터 복구',save_all:'전체 저장'};
  var ACTC={edit_cell:C.blueL,bulk_edit:C.cyan,add_row:C.green,
    delete_row:C.red,import:C.gold,restore:C.orange,save_all:C.green};

  return h('div',{className:'fade'},
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}},
      h('div',null,
        h('h2',{style:{fontSize:17,fontWeight:800}},'수정 이력 & 백업/복구'),
        h('div',{style:{fontSize:11,color:C.gray}},'모든 변경 내역 · 구글 시트에 자동 저장')),
      h('div',{style:{display:'flex',gap:8}},
        h('button',{onClick:doSnapshot,
          style:{padding:'8px 16px',background:C.blueL+'30',border:'1px solid '+C.blueL,
            borderRadius:8,color:C.blueL,fontWeight:700,fontSize:12}},'💾 지금 백업'),
        h('button',{onClick:function(){loadLog();loadSnaps();},
          style:{padding:'8px 12px',background:C.navyL,border:'1px solid '+C.border,
            borderRadius:8,color:C.grayL,fontSize:12}},'🔄')
      )
    ),
    msg&&h('div',{style:{padding:'10px 14px',borderRadius:8,marginBottom:14,
      background:mc2+'18',border:'1px solid '+mc2+'50',color:mc2,fontSize:12}},msg),

    // 탭
    h('div',{style:{display:'flex',gap:4,marginBottom:16,background:C.navyL,
      borderRadius:10,padding:4,border:'1px solid '+C.border}},
      [['audit','📋 수정 이력',log.length+'건'],['backup','💾 백업/복구',snaps.length+'개']].map(function(t){
        var act=tabV===t[0];
        return h('button',{key:t[0],onClick:function(){setTabV(t[0]);},
          style:{flex:1,padding:'8px 12px',borderRadius:7,border:'none',cursor:'pointer',
            background:act?'linear-gradient(90deg,'+C.blue+','+C.blueL+')':'none',
            color:act?'#fff':C.grayL,fontWeight:act?700:400,fontSize:13,
            display:'flex',alignItems:'center',justifyContent:'center',gap:6}},
          t[1],h('span',{style:{fontSize:10,padding:'1px 6px',background:act?'#ffffff30':C.border,borderRadius:4}},t[2]));
      })
    ),

    // 수정 이력
    tabV==='audit'&&(log.length===0
      ?h('div',{style:{textAlign:'center',padding:48,color:C.gray}},
        h('div',{style:{fontSize:36,marginBottom:8}},'📋'),h('div',null,'수정 이력이 없습니다'))
      :h('div',{style:{display:'flex',flexDirection:'column',gap:6,maxHeight:'calc(100vh - 320px)',overflowY:'auto'}},
        log.map(function(e){
          var clr=ACTC[e.action]||C.grayL;
          return h('div',{key:e.id||e.created_at,
            style:{background:C.navyL,border:'1px solid '+C.border,borderRadius:10,
              padding:'10px 14px',borderLeft:'3px solid '+clr}},
            h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4}},
              h('div',{style:{width:26,height:26,borderRadius:'50%',flexShrink:0,
                background:'linear-gradient(135deg,'+C.blue+','+C.blueL+')',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:11,fontWeight:700,color:'#fff'}},(e.userName||'?').charAt(0)),
              h('span',{style:{fontSize:13,fontWeight:600,color:C.white}},e.userName),
              h('span',{style:{padding:'2px 7px',borderRadius:5,fontSize:11,fontWeight:700,
                color:clr,background:clr+'20'}},ACT[e.action]||e.action),
              h('span',{style:{marginLeft:'auto',fontSize:10,color:C.gray,
                fontFamily:"'IBM Plex Mono',monospace"}},
                new Date(e.created_at).toLocaleString('ko-KR'))
            ),
            h('div',{style:{display:'flex',gap:14,fontSize:11,flexWrap:'wrap'}},
              e.targetId&&h('span',{style:{color:C.gray}},'대상: ',h('b',{style:{color:C.grayL}},e.targetId)),
              e.fieldName&&h('span',{style:{color:C.gray}},'필드: ',h('b',{style:{color:C.grayL}},e.fieldName)),
              (e.oldValue||e.newValue)&&h('span',{style:{color:C.gray}},
                h('span',{style:{color:C.red+'cc',textDecoration:'line-through'}},e.oldValue||'(빈값)'),
                ' → ',h('span',{style:{color:C.green}},e.newValue||'(빈값)'))
            )
          );
        }),
        currentUser.role==='admin'&&h('button',{onClick:clearLog,
          style:{marginTop:8,padding:'7px 14px',background:C.red+'18',
            border:'1px solid '+C.red+'40',borderRadius:7,color:C.red,fontSize:12}},
          '🗑 이력 초기화 (관리자)')
      )
    ),

    // 백업/복구
    tabV==='backup'&&(snaps.length===0
      ?h('div',{style:{textAlign:'center',padding:48,color:C.gray}},
        h('div',{style:{fontSize:36,marginBottom:8}},'💾'),
        h('div',null,'저장된 백업이 없습니다'),
        h('div',{style:{fontSize:12,marginTop:8,color:C.gray}},'상단 "지금 백업" 버튼으로 현재 상태를 저장하세요'))
      :h('div',{style:{display:'flex',flexDirection:'column',gap:10,maxHeight:'calc(100vh - 320px)',overflowY:'auto'}},
        snaps.map(function(snap){
          return h('div',{key:snap.id,
            style:{background:C.navyL,border:'1px solid '+C.border,borderRadius:12,
              padding:'13px 16px',display:'flex',alignItems:'center',gap:12}},
            h('div',{style:{fontSize:26,flexShrink:0}},
              (snap.label||'').indexOf('자동')>=0?'🔄':'💾'),

function getSiteList() {
  try {
    var list = JSON.parse(localStorage.getItem(SITE_KEY)||'[]');
    return list.filter(function(s){
      return s && s.code && /^[A-Z0-9_]{1,15}$/.test(String(s.code).trim());
    });
  } catch(e){ return []; }
}
function saveSiteList(s) {
  try { localStorage.setItem(SITE_KEY, JSON.stringify(s)); } catch(e){} }

function parseProjectCode(proj) {
  if (!proj) return null;
  var s = String(proj).trim();
  // 패턴1: "HSB-MR02. 공사명" → siteCode=HSB, mrCode=MR02
  var m1 = s.match(/^([A-Z][A-Z0-9]+)-([A-Z]+\d+[-\d]*)\.\s*(.+)/);
  if (m1) return { siteCode: m1[1], mrCode: m1[2], name: m1[3] };
  // 패턴1b: "HSB-MR-99. 공사명" 등 MR에 하이픈 있는 경우
  var m1b = s.match(/^([A-Z][A-Z0-9]+)-([A-Z]+-\d+)\.\s*(.+)/);
  if (m1b) return { siteCode: m1b[1], mrCode: m1b[2], name: m1b[3] };
  // 패턴2: "MR29. 공사명" → siteCode=TA (MR계열은 TA 대공사로 귀속)
  var m2 = s.match(/^(MR\d+)\.\s*(.+)/i);
  if (m2) return { siteCode: 'TA', mrCode: m2[1].toUpperCase(), name: m2[2] };
  // 패턴3: "추가01. 공사명" 또는 "1-1A. 공사명" → siteCode=TA
  var m3 = s.match(/^([\w가-힣\-]+)\.\s*(.+)/);
  if (m3) return { siteCode: 'TA', mrCode: m3[1], name: m3[2] };
  // 패턴4: "7. #6선석..." 숫자로 시작
  var m4 = s.match(/^(\d+)\.\s*(.+)/);
  if (m4) return { siteCode: 'TA', mrCode: 'EXTRA' + m4[1], name: m4[2] };
  return { siteCode: null, mrCode: null, name: s };
}

// ★ 임시번호에서 공사 식별키 추출
// "MR-01-001" → "MR-01"  (마지막 -XXX 3자리 숫자 제거)
function extractProjKeyFromTmpNo(tmpNo) {
  if (!tmpNo) return '';
  var s = String(tmpNo).trim();
  // 마지막 하이픈+숫자(3자리) 제거: "HSB-MR01-F-001" → "HSB-MR01-F"
  var m = s.match(/^(.+)-\d{3}$/);
  return m ? m[1] : s;
}

// ★ Request No. 생성 규칙:
// prefix + "-" + tmpNoKey + "-" + ndeType + "-" + S|F + "-" + 세자리시퀀스
// prefix는 preset.reqPrefix (사용자 지정)
// 동일 프로젝트+타입+S/F 조합 내에서 001부터 증가
function buildRequestNo(preset, ndeType, shopField, seq, projKey) {
  var prefix = (preset.reqPrefix || preset.company || 'MT').replace(/[-\s]+$/,'');
  var key = projKey || (preset.projCode||'MR-01');
  var sf = shopField === 'S' ? 'S' : shopField === 'B' ? 'B' : 'F';
  return [prefix, key, ndeType, sf, String(seq).padStart(3,'0')].join('-');
}

// ★ 시퀀스 번호: ndeHistory + folderReg 모두 참조해서 동일 그룹 내 최대+1
// groupKey = "prefix-projKey-ndeType-sf"  (예: MT-HSB-02-RT-F)
function nextSeqNo(history, ndeType, shopField, preset, projKey) {
  var key    = (projKey || preset.projCode || 'MR-01').trim();
  var pfx    = (preset.reqPrefix || preset.company || 'MT').replace(/[-\s]+$/, '');
  var sf     = shopField === 'S' ? 'S' : shopField === 'B' ? 'B' : 'F';
  var group  = [pfx, key, ndeType, sf].join('-');  // "MT-HSB-02-RT-F"
  var maxSeq = 0;

  // history에서 탐색
  (history || []).forEach(function(h) {
    var rn = (h.request_no || '').replace(/\s+[Rr]ev[\.\s]*\d+$/i, '').trim();
    if (rn.startsWith(group + '-')) {
      var seq = parseInt(rn.slice(group.length + 1), 10);
      if (!isNaN(seq) && seq > maxSeq) maxSeq = seq;
    }
  });

  // folderReg에서도 탐색 (다운로드만 하고 발송 안 한 경우 포함)
  try {
    var reg = getNDEFolderReg();
    Object.keys(reg).forEach(function(fkey) {
      (reg[fkey] || []).forEach(function(entry) {
        var rn2 = (entry.request_no || '').replace(/\s+[Rr]ev[\.\s]*\d+$/i, '').trim();
        if (rn2.startsWith(group + '-')) {
          var seq2 = parseInt(rn2.slice(group.length + 1), 10);
          if (!isNaN(seq2) && seq2 > maxSeq) maxSeq = seq2;
        }
      });
    });
  } catch(e) {}

  return maxSeq + 1;
}

// ★ 취소선 판별: 특정 컬럼 3개 이상 취소선 패턴 (~~value~~ 또는 cancelled 마커)
// 데이터에 cancelledFields 배열이 있거나 status=CANCELLED
function isCancelledRow(d) {
  if (!d) return false;
  if (d.status === 'CANCELLED' || d.status === 'DELETED') return true;
  // cancelledFields: 취소선이 그어진 필드 수가 3개 이상
  if (Array.isArray(d.cancelledFields) && d.cancelledFields.length >= 3) return true;
  return false;
}

  function toggleJoint(id){

  // ── Remark 관리

  // ── 파일명 생성
  // ★ 파일명: "REQUEST_NO Rev.N YYYY.MM.DD.xlsx"
  function buildFilename(reqNo, rev, date) {
    // date: YYYY-MM-DD → YYYY.MM.DD
    var d = (date||today()).replace(/-/g,'.');
    var base = (reqNo||'REQUEST') + (rev>0?' Rev.'+rev:'') + ' ' + d;
    return base + '.xlsx';
  }

  // ── 엑셀 생성 (인쇄용: 채우기 없음, 얇은 검정 선 통일, Remark만 채우기)
  function generateExcel(rows, form, revNum) {
    if (typeof XLSX === 'undefined') throw new Error('SheetJS 미로드');
    var wb2 = XLSX.utils.book_new();
    var t = form.nde_type;
    var xlTitle = t==='PWHT'?'PWHT REQUEST':'NDE ( '+t+' ) REQUEST';
    var reqNoFull = (form.request_no||'') + (revNum>0?' Rev.'+revNum:'');

    // ── 선: 모두 thin black / 채우기: none (패턴 없음)
    var bT = {style:'thin', color:{rgb:'000000'}};
    var bAll = {top:bT, bottom:bT, left:bT, right:bT};
    var NONE_FILL = {patternType:'none'};  // 채우기 없음
    var BLACK = '000000';

    function sc(r, c, val, s) {
      ws[XLSX.utils.encode_cell({r:r, c:c})] = {
        v: val===null||val===undefined ? '' : val,
        t: typeof val==='number' ? 'n' : 's',
        s: s
      };
    }

    // 타이틀 행 — 채우기 없음, 굵은 텍스트
    var sTitle = {
      font: {bold:true, sz:13, color:{rgb:BLACK}, name:'Calibri'},
      fill: NONE_FILL,
      alignment: {horizontal:'center', vertical:'center'},
      border: {bottom:bT}
    };
    // 라벨 (PROJECT NAME: 등) — 채우기 없음, 볼드
    var sLabel = {
      font: {bold:true, sz:9, color:{rgb:BLACK}, name:'Calibri'},
      fill: NONE_FILL,
      alignment: {horizontal:'left', vertical:'center'},
      border: bAll
    };
    // 값 — 채우기 없음
    var sValue = {
      font: {sz:10, color:{rgb:BLACK}, name:'Calibri'},
      fill: NONE_FILL,
      alignment: {horizontal:'left', vertical:'center'},
      border: bAll
    };
    var sValueBold = {
      font: {bold:true, sz:10, color:{rgb:BLACK}, name:'Calibri'},
      fill: NONE_FILL,
      alignment: {horizontal:'left', vertical:'center'},
      border: bAll
    };
    // 헤더 행 — 채우기 없음, 볼드
    var sHdr = {
      font: {bold:true, sz:9, color:{rgb:BLACK}, name:'Calibri'},
      fill: NONE_FILL,
      alignment: {horizontal:'center', vertical:'center', wrapText:true},
      border: bAll
    };
    // 빈 셀 — 채우기 없음, 선 없음
    var sEmpty = {fill: NONE_FILL};

    // 데이터 셀 스타일 생성
    // clrHex: remark 셀에만 채우기 적용 (hex or '')
    function mkDataStyle(clrHex, isLeft) {
      var fillStyle = clrHex
        ? {fgColor: {rgb: clrHex.replace('#','')}}
        : NONE_FILL;
      return {
        font: {sz:9, color:{rgb:BLACK}, name:'Calibri'},
        fill: fillStyle,
        alignment: {horizontal:isLeft?'left':'center', vertical:'center', wrapText:!!isLeft},
        border: bAll
      };
    }

    var ws = {};
    var numCols = 13;
    function emptyRow(r) {
      for (var ci=0; ci<numCols; ci++) sc(r, ci, '', sEmpty);
    }

    // R0: 여백
    emptyRow(0);

    // R1: 제목 (A~M 병합)
    sc(1,0,xlTitle,sTitle);
    for (var ci=1; ci<numCols; ci++) sc(1,ci,'',sTitle);

    // R2: 여백
    emptyRow(2);

    // R3: PROJECT NAME
    sc(3,0,'PROJECT NAME :',sLabel); sc(3,1,'',sLabel);
    sc(3,2,form.project||'',sValueBold);
    for (var ci2=3; ci2<7; ci2++) sc(3,ci2,'',sValue);
    for (var ci3=7; ci3<numCols; ci3++) sc(3,ci3,'',sEmpty);

    // R4: NDE SUBCON / SUBCON
    sc(4,0,'NDE SUBCON :',sLabel); sc(4,1,'',sLabel);
    sc(4,2,form.nde_subcon||'',sValue);
    for (var ci4=3; ci4<7; ci4++) sc(4,ci4,'',sValue);
    sc(4,7,'SUBCON :  '+(form.subcon||''),sValueBold);
    for (var ci5=8; ci5<numCols; ci5++) sc(4,ci5,'',sValue);

    // R5: REQUEST DATE / REQUEST NO
    sc(5,0,'REQUEST DATE :',sLabel); sc(5,1,'',sLabel);
    sc(5,2,form.request_date||'',sValue);
    for (var ci6=3; ci6<7; ci6++) sc(5,ci6,'',sValue);
    sc(5,7,'REQUEST NO. :  '+reqNoFull,sValueBold);
    for (var ci7=8; ci7<numCols; ci7++) sc(5,ci7,'',sValue);

    // R6: INSPECTION DATE
    sc(6,0,'INSPECTION DATE :',sLabel); sc(6,1,'',sLabel);
    sc(6,2,form.inspection_date||'',sValue);
    for (var ci8=3; ci8<numCols; ci8++) sc(6,ci8,'',sValue);

    // R7: 여백
    emptyRow(7);

    // R8: 헤더
    var hdrs = ['NO','Serial No.','LINE NO.','ISO DWG NO.','JOINT NO.',
                'SHOP/\nFIELD','MATL','JOINT\nTYPE','WELDER','SIZE','SCH','THK\n(mm)','REMARK'];
    hdrs.forEach(function(hv,c){ sc(8,c,hv,sHdr); });

    // R9+: 데이터
    rows.forEach(function(j, i) {
      var r = 9 + i;
      var clrHex = rmkClr[j.id] || '';
      // ★ 삭제된 조인트(deleted marker): 노란 배경 + "포인트 삭제"
      var isDeleted = j._deleted === true;
      var rkText = isDeleted
        ? '포인트 삭제'
        : (rmkOv[j.id] !== undefined ? rmkOv[j.id]
           : (rmkMode === 'log' ? (j.remark||'') : ''));
      var rkColor = isDeleted ? 'FFFF00' : (clrHex ? clrHex.replace('#','') : '');

      var vals = [
        i+1, j.tmpNo||'', j.lineNo||'', j.isoNo||'', j.jointNo||'',
        j.shopField==='S'?'Shop':'Field',
        j.mat2||j.mat1||j.matClass||'',
        j.weldType||'BW', j.welder||'', j.size||'', j.sch||'', j.thick||'',
        rkText
      ];
      vals.forEach(function(v, c) {
        var isRemark = (c === 12);
        var isLeft   = (c === 12 || c === 1 || c === 2 || c === 3);
        var cellClr  = isRemark ? rkColor : '';
        sc(r, c, v, mkDataStyle(cellClr, isLeft));
      });
    });

    var lastRow = Math.max(9, 9 + rows.length - 1);
    ws['!ref'] = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:lastRow,c:12}});
    ws['!cols'] = [
      {wch:5},{wch:14},{wch:28},{wch:28},{wch:10},
      {wch:8},{wch:10},{wch:11},{wch:8},{wch:6},{wch:6},{wch:9},{wch:22}
    ];
    var rowH = [{hpt:4},{hpt:26},{hpt:4},{hpt:17},{hpt:17},{hpt:17},{hpt:17},{hpt:4},{hpt:22}];
    for (var ri=0; ri<rows.length; ri++) rowH.push({hpt:16});
    ws['!rows'] = rowH;
    ws['!merges'] = [
      {s:{r:1,c:0},  e:{r:1,c:12}},
      {s:{r:3,c:0},  e:{r:3,c:1}},  {s:{r:3,c:2},  e:{r:3,c:6}},
      {s:{r:4,c:0},  e:{r:4,c:1}},  {s:{r:4,c:2},  e:{r:4,c:6}},  {s:{r:4,c:7},e:{r:4,c:12}},
      {s:{r:5,c:0},  e:{r:5,c:1}},  {s:{r:5,c:2},  e:{r:5,c:6}},  {s:{r:5,c:7},e:{r:5,c:12}},
      {s:{r:6,c:0},  e:{r:6,c:1}},  {s:{r:6,c:2},  e:{r:6,c:12}}
    ];
    ws['!pageSetup'] = {paperSize:9, orientation:'landscape', fitToPage:true, fitToWidth:1};
    ws['!margins']   = {left:0.5, right:0.5, top:0.75, bottom:0.75, header:0.3, footer:0.3};

    XLSX.utils.book_append_sheet(wb2, ws, 'REQUEST');
    return XLSX.write(wb2, {bookType:'xlsx', type:'array'});
  }

  // ── 미리보기용 데이터
  function buildPreviewData(rows, form, revNum) {
    var t = form.nde_type;
    var title = t==='PWHT'?'PWHT REQUEST':'NDE ( '+t+' ) REQUEST';
    var reqNoFull = (form.request_no||'') + (revNum>0?' Rev.'+revNum:'');

    // ★ 편집 모드: 원본에 있었지만 현재 선택에서 제거된 조인트 → _deleted:true 행 추가
    var currentIds = new Set(rows.map(function(r){ return r.id; }));
    var deletedRows = [];
    if (origJoints && origJoints.size > 0) {
      origJoints.forEach(function(oid) {
        if (!currentIds.has(oid)) {
          var d2 = data.find(function(d){ return d.id === oid; });
          if (d2) deletedRows.push(Object.assign({}, d2, {_deleted:true}));
        }
      });
    }

    var allRows = rows.concat(deletedRows);

    return {
      title:title, project:form.project||'', nde_subcon:form.nde_subcon||'',
      subcon:form.subcon||'', request_date:form.request_date||'',
      inspection_date:form.inspection_date||'', request_no:reqNoFull,
      nde_type:t, form:form, revNum:revNum,
      rows: allRows.map(function(j,i){
        var isDeleted = j._deleted === true;
        var rkText = isDeleted ? '포인트 삭제'
          : (rmkOv[j.id]!==undefined ? rmkOv[j.id] : (rmkMode==='log'?(j.remark||''):''));
        return {
          id:j.id, no:i+1, _deleted:isDeleted,
          tmpNo:j.tmpNo||'', lineNo:j.lineNo||'', isoNo:j.isoNo||'',
          jointNo:j.jointNo||'', shopField:j.shopField==='S'?'Shop':'Field',
          matl:j.mat2||j.mat1||j.matClass||'', weldType:j.weldType||'BW',
          welder:j.welder||'', size:j.size||'', sch:j.sch||'', thick:j.thick||'',
          remark:rkText, rmkColor:isDeleted ? '#FFFF00' : (rmkClr[j.id]||'')
        };
      }),
      filename:buildFilename(form.request_no, revNum, form.request_date)
    };
  }

  // ── 미리보기 열기
  function downloadExcel() {
    if (!selectedRows.length){alert('조인트를 선택하세요');return;}
    if (!reqForm.request_no){alert('REQUEST NO.를 입력하세요');return;}
    try { setPreviewData(buildPreviewData(selectedRows, reqForm, reqForm.rev||0)); }
    catch(ex){ setDlState('error'); setDlMsg('❌ '+ex.message); }
  }

  // ── 실제 다운로드 + 폴더 저장
  function doDownloadFromPreview(pd) {
    if (!pd) return;
    try {
      var arr = generateExcel(selectedRows, pd.form, pd.revNum);
      var blob = new Blob([arr],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');

  // ── NDE Request 엑셀 업로드
  function importNDERequest(file) {
    if (!file) return;
    var reader=new FileReader();
    reader.onload=function(ev){
      try {
        var ndeWb=XLSX.read(ev.target.result,{type:'array',cellDates:true,raw:false});
        var ndeWs=ndeWb.Sheets[ndeWb.SheetNames[0]];
        var ndeRows=XLSX.utils.sheet_to_json(ndeWs,{header:1,defval:null,raw:true});
        var reqNo2='',ndeType2='RT';
        for(var ri=0;ri<12;ri++){
          var row2=ndeRows[ri]||[];
          row2.forEach(function(v){
            var s2=String(v||'');
            if(s2.indexOf('REQUEST NO')>=0){var m=s2.match(/REQUEST NO[.\s]*:\s*(.+)/i);if(m)reqNo2=m[1].trim();}
            if(s2.indexOf('NDE (')>=0){var tm=s2.match(/NDE\s*[(\s]+([A-Z]+)/i);if(tm)ndeType2=tm[1].toUpperCase();}
          });
        }
        // 데이터 행 찾기 (NO 헤더 다음)
        var hdrIdx=-1;
        for(var ri2=0;ri2<ndeRows.length;ri2++){
          if(ndeRows[ri2]&&String(ndeRows[ri2][0]||'').toUpperCase()==='NO'){hdrIdx=ri2;break;}
        }
        if(hdrIdx<0){alert('❌ 헤더 행을 찾지 못했습니다');return;}
        var matched=0;
        for(var ri3=hdrIdx+1;ri3<ndeRows.length;ri3++){
          var dr=ndeRows[ri3];
          if(!dr||dr.every(function(v){return!v;}))continue;
          var isoV=String(dr[3]||'').trim(),jnV=String(dr[4]||'').trim();
          data.forEach(function(d2){
            var reqFld2=ndeType2==='PT'||ndeType2==='MT'?'ptReqNo':'rtReqNo';
            if(String(d2.isoNo||'').trim()===isoV&&String(d2.jointNo||'').trim()===jnV&&!d2[reqFld2]){
              var reqFldDate2=ndeType2==='PT'||ndeType2==='MT'?'ptReqDate':'rtReqDate';
              var upd2=Object.assign({},d2);
              upd2[reqFld2]=reqNo2; upd2[reqFldDate2]=today();
              if(upd2.status==='PENDING'||upd2.status==='FITUP'||upd2.status==='VISUAL') upd2.status='NDE_REQ';
              setData(function(prev){ return prev.map(function(x){return x.id===d2.id?upd2:x;}); });
              matched++;
            }
          });
        }
        alert('✅ '+matched+'건 Request 번호 적용됨 ('+reqNo2+')');
      } catch(ex){alert('❌ '+ex.message);}
    };
    reader.readAsArrayBuffer(file);
  }

// ════ welder_db ════
var WELDER_DB_KEY = 'qms_welder_db';

function getWelderDB() {
  try {
    var s = localStorage.getItem(WELDER_DB_KEY);
    if (s) return JSON.parse(s);
  } catch(e) {}
  return WELDER_INITIAL_DATA ? JSON.parse(JSON.stringify(WELDER_INITIAL_DATA)) : [];
}
function saveWelderDB(list) {
  try {
    localStorage.setItem(WELDER_DB_KEY, JSON.stringify(list));
  } catch(e) {
    try {
      localStorage.setItem(WELDER_DB_KEY, JSON.stringify(
        list.map(function(w){ return Object.assign({}, w, {photo:''}); })
      ));
    } catch(e2) {}
  }
}
function getWelderById(id) {
  if (!id) return null;
  var sid = String(id).trim();
  return getWelderDB().find(function(w){ return String(w.id).trim() === sid; }) || null;
}
function getWelderByIdFlexible(id) {
  if (!id) return null;
  var sid = String(id).trim();
  var db = getWelderDB();
  var w = db.find(function(w){ return String(w.id).trim() === sid; });
  if (w) return w;
  w = db.find(function(w){ return String(w.id).trim() === sid || w.name === sid; });
  return w || null;
}

// ════ welder_tooltip ════
// WelderTooltip — 마우스오버 시 사진+정보 팝업
// ════════════════════════════════════════════════════════════════════════
function WelderTooltip(props) {
  var welderId = props.welderId;
  var children = props.children;
  var hs = useState(false); var hovered = hs[0]; var setHovered = hs[1];
  var ps = useState({x:0,y:0}); var pos = ps[0]; var setPos = ps[1];
  var ts = useState(null); var timer = ts[0]; var setTimer = ts[1];
  var welder = useMemo(function(){ return getWelderByIdFlexible(welderId); }, [welderId]);
  if (!welder) return h('span', null, children);

  function onMove(e) {
    var mx = e.clientX, my = e.clientY;
    var TW = 190, TH = 290;
    var left = mx + 16;
    var top  = my - 10;
    if (left + TW > window.innerWidth - 8) left = mx - TW - 16;
    if (top + TH > window.innerHeight - 8) top = window.innerHeight - TH - 8;
    if (top < 8) top = 8;
    setPos({ x: left, y: top });
  }
  function onEnter(e) {
    onMove(e);
    var t = setTimeout(function(){ setHovered(true); }, 180);
    setTimer(t);
  }
  function onLeave() { if (timer) clearTimeout(timer); setHovered(false); }

  return h('span', { style:{position:'relative',display:'inline-block',cursor:'default'},
    onMouseEnter:onEnter, onMouseLeave:onLeave, onMouseMove:onMove },
    children,
    hovered && h('div', { style:{
      position:'fixed',
      left: pos.x,
      top:  pos.y,
      zIndex:9999, pointerEvents:'none', animation:'fadeIn .12s ease',
      background:'linear-gradient(135deg,'+C.navyL+','+C.steel+')',
      border:'1px solid '+C.blueL+'80', borderRadius:12,
      padding:14, width:190, boxShadow:'0 8px 32px #00000080'
    }},
      welder.photo
        ? h('img',{src:welder.photo,alt:welder.name,style:{
            width:'100%',height:100,objectFit:'cover',borderRadius:8,
            border:'1px solid '+C.border,marginBottom:10,display:'block'}})
        : h('div',{style:{width:'100%',height:80,borderRadius:8,
            background:'linear-gradient(135deg,'+C.blue+','+C.blueL+')',
            display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:32,marginBottom:10}},'👤'),
      h('div',{style:{fontSize:14,fontWeight:800,color:C.white,marginBottom:3}},welder.name),
      h('div',{style:{fontSize:11,color:C.blueL,fontFamily:"'IBM Plex Mono',monospace",marginBottom:4}},
        'ID: '+welder.id),
      welder.dob && h('div',{style:{fontSize:10,color:C.gray,marginBottom:4}},'📅 '+welder.dob),
      h('div',{style:{
        padding:'2px 8px',borderRadius:4,fontSize:10,fontWeight:700,
        display:'inline-block',marginBottom:6,
        background:welder.idOk==='ID OK'?C.green+'25':C.red+'20',
        color:welder.idOk==='ID OK'?C.green:C.red,
        border:'1px solid '+(welder.idOk==='ID OK'?C.green:C.red)+'50'
      }}, welder.idOk||'미발급'),
      welder.qualifications && welder.qualifications.length>0 &&
        h('div',{style:{marginTop:4}},
          h('div',{style:{fontSize:9,color:C.gray,marginBottom:3,letterSpacing:'.06em'}},'자격'),
          welder.qualifications.slice(-2).map(function(q,i){
            return h('div',{key:i,style:{fontSize:10,color:C.grayL,marginBottom:2,
              background:C.navy,borderRadius:4,padding:'2px 5px'}},
              (q.method||'')+(q.material?' / '+q.material:'')+(q.position?' / '+q.position:''));
          })
        )
    )
  );
}

// ════ welder_panel ════
function WelderPanel() {
  var ws = useState(getWelderDB()); var welders = ws[0]; var setWeldersRaw = ws[1];
  function setWelders(list) { setWeldersRaw(list); saveWelderDB(list); }

  // 엑셀 업로드 후 localStorage 갱신된 데이터 다시 읽기
  function reloadFromStorage() {
    var fresh = getWelderDB();
    setWeldersRaw(fresh);
  }
  // 탭 전환 시 자동으로 최신 데이터 로드
  React.useEffect(function(){ reloadFromStorage(); }, []);

  var sq  = useState('');    var searchQ   = sq[0];  var setSearchQ   = sq[1];
  var fm  = useState('all'); var filterMth = fm[0];  var setFilterMth = fm[1];
  var sID = useState(null);  var selId     = sID[0]; var setSelId     = sID[1]; // 상세보기
  var ms  = useState('');    var msg       = ms[0];  var setMsg       = ms[1];
  var mc  = useState(C.green);var msgClr   = mc[0];  var setMsgClr    = mc[1];

  // 폼 모달 상태
  var fw = useState(null);   var formWelder = fw[0]; var setFormWelder = fw[1]; // null | welder obj
  var fm2= useState('');     var formMode   = fm2[0];var setFormMode   = fm2[1]; // 'add' | 'edit'

  // 자격 편집 폼 (폼 내부)
  var fq = useState(null);   var formQual  = fq[0];  var setFormQual  = fq[1]; // 편집 중인 자격 인덱스
  var nq = useState(false);  var addingQual= nq[0];  var setAddingQual= nq[1]; // 자격 추가 중
  var newQ= useState({method:'GTAW',material:'C/S',pNo:'1',position:'6G',
    sizeTHK:'',electrode:'ER70S-6',testDate:'',result:'Accept',qualified:'',remarks:''});
  var newQual = newQ[0]; var setNewQual = newQ[1];

  function showMsg(m,ok){ setMsg(m);setMsgClr(ok?C.green:C.red);setTimeout(function(){setMsg('');},3000); }

  // ── 용접사 추가 폼 열기
  function openAdd() {
    setFormWelder({ id:'', name:'', dob:'', idOk:'ID OK', photo:'', qualifications:[] });
    setFormMode('add');
    setAddingQual(false); setFormQual(null);
  }

  // ── 용접사 수정 폼 열기
  function openEdit(w) {
    setFormWelder(JSON.parse(JSON.stringify(w))); // 깊은 복사
    setFormMode('edit');
    setAddingQual(false); setFormQual(null);
  }

  // ── 저장
  function saveWelder() {
    if (!formWelder.name.trim()) { showMsg('이름을 입력하세요', false); return; }
    if (!formWelder.id.trim())   { showMsg('용접사 ID(번호)를 입력하세요', false); return; }
    if (formMode === 'add') {
      var dup = welders.find(function(w){ return w.id === formWelder.id.trim(); });
      if (dup) { showMsg('이미 존재하는 ID입니다: '+formWelder.id, false); return; }
      setWelders(welders.concat([Object.assign({},formWelder,{id:formWelder.id.trim()})]));
      showMsg('✅ '+formWelder.name+' 추가 완료', true);
    } else {
      setWelders(welders.map(function(w){ return w.id===formWelder.id ? formWelder : w; }));
      showMsg('✅ 수정 완료', true);
    }
    setFormWelder(null);
  }

  // ── 삭제
  function deleteWelder(id) {
    var w = welders.find(function(x){ return x.id===id; });
    if (!confirm((w?w.name:id)+' 용접사를 삭제하시겠습니까?')) return;
    setWelders(welders.filter(function(x){ return x.id!==id; }));
    if (selId===id) setSelId(null);
    showMsg('삭제 완료', true);
  }

  // ── 사진 업로드
  function handlePhoto(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      setFormWelder(Object.assign({}, formWelder, { photo: ev.target.result }));
    };
    reader.readAsDataURL(file);
  }

  // ── 자격 추가
  function addQual() {
    if (!newQual.method||!newQual.testDate) { showMsg('공법과 시험일자를 입력하세요',false); return; }
    var quals = (formWelder.qualifications||[]).concat([Object.assign({},newQual)]);
    setFormWelder(Object.assign({},formWelder,{qualifications:quals}));
    setAddingQual(false);
    setNewQual({method:'GTAW',material:'C/S',pNo:'1',position:'6G',sizeTHK:'',
      electrode:'ER70S-6',testDate:'',result:'Accept',qualified:'',remarks:''});
  }

  // ── 자격 수정
  function saveQual(idx) {
    var quals = (formWelder.qualifications||[]).slice();
    quals[idx] = Object.assign({},quals[idx]);
    setFormWelder(Object.assign({},formWelder,{qualifications:quals}));
    setFormQual(null);
  }

  // ── 자격 삭제
  function deleteQual(idx) {
    var quals = (formWelder.qualifications||[]).filter(function(_,i){ return i!==idx; });
    setFormWelder(Object.assign({},formWelder,{qualifications:quals}));
    if (formQual===idx) setFormQual(null);
  }

  // ── 초기화
  function resetDB() {
    if (!confirm('엑셀 원본 데이터로 초기화하시겠습니까?')) return;
    var fresh = JSON.parse(JSON.stringify(WELDER_INITIAL_DATA||[]));
    setWelders(fresh); showMsg('초기화 완료',true);
  }

  // ── 만료 체크
  function isExpired(d) {
    if (!d) return false;
    var exp = new Date(d); exp.setFullYear(exp.getFullYear()+3);
    return exp < new Date();
  }
  function isExpiringSoon(d) {
    if (!d) return false;
    var exp = new Date(d); exp.setFullYear(exp.getFullYear()+3);
    var diff = (exp-new Date())/(1000*60*60*24);
    return diff>0 && diff<=90;
  }

  var allMethods = useMemo(function(){
    var seen={},list=['all'];
    welders.forEach(function(w){
      (w.qualifications||[]).forEach(function(q){
        if(q.method&&!seen[q.method]){seen[q.method]=true;list.push(q.method);}
      });
    });
    return list;
  },[welders]);

  var filtered = useMemo(function(){
    var q=searchQ.toLowerCase();
    return welders.filter(function(w){
      var ms2 = !q||[w.id,w.name,w.idOk].some(function(v){return String(v||'').toLowerCase().indexOf(q)>=0;});
      var mm  = filterMth==='all'||(w.qualifications||[]).some(function(qu){return qu.method===filterMth;});
      return ms2&&mm;
    });
  },[welders,searchQ,filterMth]);

  var stats = useMemo(function(){
    var expired=0,soon=0,active=0;
    welders.forEach(function(w){
      var e=false,s=false,a=false;
      (w.qualifications||[]).forEach(function(q){
        if(isExpired(q.testDate))e=true;
        else if(isExpiringSoon(q.testDate))s=true;
        else if(q.testDate)a=true;
      });
      if(e)expired++;else if(s)soon++;else if(a)active++;
    });
    return{expired,soon,active};

  var MATERIALS = ['C/S','S/S','Low Alloy','Duplex','Inconel'];
  var POSITIONS = ['1G','2G','3G','4G','5G','6G','1F','2F','3F','4F','2F/3F'];

// ════════════════════════════════════════════════════════════════════════
// 도면 파일 관리 — IndexedDB + PDF 뷰어(스케일) + 주석 편집
// ════════════════════════════════════════════════════════════════════════

var DWG_DB_NAME    = 'PIPE_QMS_Drawings';
var DWG_DB_VERSION = 1;
var DWG_STORE      = 'drawings';
var DWG_VER_STORE  = 'drawing_versions';
var _dwgDB = null;

function openDwgDB() {
  return new Promise(function(resolve, reject) {
    if (_dwgDB) { resolve(_dwgDB); return; }
    var req = indexedDB.open(DWG_DB_NAME, DWG_DB_VERSION);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains(DWG_STORE)) {
        var s = db.createObjectStore(DWG_STORE, {keyPath:'id'});
        s.createIndex('isoNo',  'isoNo',  {unique:false});
        s.createIndex('projKey','projKey',{unique:false});
      }
      if (!db.objectStoreNames.contains(DWG_VER_STORE)) {
        var vs = db.createObjectStore(DWG_VER_STORE, {keyPath:'id'});
        vs.createIndex('drawingId','drawingId',{unique:false});
      }
    };
    req.onsuccess = function(e) { _dwgDB = e.target.result; resolve(_dwgDB); };
    req.onerror   = function(e) { reject(e.target.error); };
  });
}
function _idbOp(store, mode, fn) {
  return openDwgDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx  = db.transaction(store, mode);
      var st  = tx.objectStore(store);
      var req = fn(st);
      if (req && req.onsuccess !== undefined) {
        req.onsuccess = function(e) { resolve(e.target.result); };
        req.onerror   = function(e) { reject(e.target.error); };
      } else {
        tx.oncomplete = function() { resolve(); };
        tx.onerror    = function(e) { reject(e.target.error); };
      }
    });
  });
}
function dwgGetAll()    { return _idbOp(DWG_STORE,'readonly', function(s){return s.getAll();}); }
function dwgGet(id)     { return _idbOp(DWG_STORE,'readonly', function(s){return s.get(id);}); }
function dwgPut(r)      { return _idbOp(DWG_STORE,'readwrite',function(s){return s.put(r);}); }
function dwgDelete(id)  { return _idbOp(DWG_STORE,'readwrite',function(s){return s.delete(id);}); }
function verPut(r)      { return _idbOp(DWG_VER_STORE,'readwrite',function(s){return s.put(r);}); }
function verDelete(id)  { return _idbOp(DWG_VER_STORE,'readwrite',function(s){return s.delete(id);}); }
function verGetByDrawing(drawingId) {
  return openDwgDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var req = db.transaction(DWG_VER_STORE,'readonly')
        .objectStore(DWG_VER_STORE).index('drawingId').getAll(drawingId);
      req.onsuccess = function(e) { resolve(e.target.result||[]); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  });
}

function parseDrawingMeta(filename) {
  var base = filename.replace(/\.[^.]+$/, '');
  var meta = { isoNo:'', tmpNo:'', rev:'', projKey:'', title:base };
  var isoM = base.match(/(\d{4}-[A-Z0-9]+-\d+)/i);
  if (isoM) meta.isoNo = isoM[1].toUpperCase();
  var tmpM = base.match(/([A-Z]{2,5}-\d{2}-\d{3})/i);
  if (tmpM) meta.tmpNo = tmpM[1].toUpperCase();
  var revM = base.match(/[_\-]?REV[-_]?([A-Z0-9]+)/i)||base.match(/[_\-]([0-9][A-Z])$/i);
  if (revM) meta.rev = revM[1].toUpperCase();
  meta.projKey = meta.isoNo || meta.tmpNo || base;
  return meta;
}

// ════════════════════════════════════════════════════════════════════════

// ════ drawing ════
function DrawingManager(props) {
  var weldData = props.data || [];

  var ld = useState(true);    var loading    = ld[0]; var setLoading    = ld[1];
  var dw = useState([]);      var drawings   = dw[0]; var setDrawings   = dw[1];
  var sq = useState('');      var searchQ    = sq[0]; var setSearchQ    = sq[1];
  var fg = useState('all');   var filterGrp  = fg[0]; var setFilterGrp  = fg[1];
  var vw = useState(null);    var viewDwg    = vw[0]; var setViewDwg    = vw[1];
  var vm = useState(null);    var viewVers   = vm[0]; var setViewVers   = vm[1];
  var um = useState(false);   var uploading  = um[0]; var setUploading  = um[1];
  var ms = useState('');      var msg        = ms[0]; var setMsg        = ms[1];
  var mc = useState(C.green); var msgClr     = mc[0]; var setMsgClr     = mc[1];
  var em = useState({});      var editMeta   = em[0]; var setEditMeta   = em[1];
  var an = useState({});      var annotMap   = an[0]; var setAnnotMap   = an[1];
  var do2= useState(false);   var isDragOver = do2[0];var setIsDragOver = do2[1];

  // ── 뷰어 상태 (DrawingManager가 소유 → 스케일 제어)
  var sc  = useState(1.0);    var scale      = sc[0]; var setScale      = sc[1];
  var pg  = useState(1);      var pdfPage    = pg[0]; var setPdfPage    = pg[1];
  var tp  = useState(1);      var totalPages = tp[0]; var setTotalPages = tp[1];
  var em2 = useState(false);  var editAnnot  = em2[0];var setEditAnnot  = em2[1];

  React.useEffect(function() { loadDrawings(); }, []);

  function loadDrawings() {
    setLoading(true);
    dwgGetAll().then(function(list) {
      var meta = list.map(function(d) {
        return { id:d.id, filename:d.filename, fileType:d.fileType, fileSize:d.fileSize,
          isoNo:d.isoNo, tmpNo:d.tmpNo, rev:d.rev, projKey:d.projKey, title:d.title,
          pageCount:d.pageCount||1, uploadedAt:d.uploadedAt, note:d.note||'',
          versionCount:d.versionCount||0, annotCount:(d.annotations||[]).length };
      });
      meta.sort(function(a,b){ return b.uploadedAt - a.uploadedAt; });
      setDrawings(meta);
      setLoading(false);
    }).catch(function(){ setLoading(false); });
  }

  function showMsg(m,ok){ setMsg(m); setMsgClr(ok?C.green:C.red);
    setTimeout(function(){setMsg('');},4000); }

  var ANNOT_KEY = 'qms_dwg_annots';
  function loadAnnotMap() {
    try { return JSON.parse(localStorage.getItem(ANNOT_KEY)||'{}'); } catch(e){ return {}; }
  }
  function saveAnnotMap(m) {
    try { localStorage.setItem(ANNOT_KEY, JSON.stringify(m)); } catch(e) {}
  }
  React.useEffect(function(){ setAnnotMap(loadAnnotMap()); }, []);

  function handleAnnotChange(dwgId, annots) {
    var upd = Object.assign({}, annotMap, {[dwgId]: annots});
    setAnnotMap(upd);
    saveAnnotMap(upd);
  }

  function handleFiles(files) {
    var arr = Array.from(files).filter(function(f){
      return /\.(pdf|png|jpg|jpeg|gif|tiff|bmp)$/i.test(f.name);
    });
    if (!arr.length){ showMsg('PDF 또는 이미지 파일만 가능합니다',false); return; }
    setUploading(true);
    var count = 0;
    function next(i) {
      if (i >= arr.length) {
        setUploading(false); loadDrawings();
        showMsg('✅ '+count+'개 업로드 완료',true); return;
      }
      var file = arr[i];
      var reader = new FileReader();
      reader.onload = function(ev) {
        var dataUrl = ev.target.result;
        var meta    = parseDrawingMeta(file.name);
        var nowTs   = Date.now();

        dwgGetAll().then(function(all) {
          var existing = all.find(function(d){
            return d.projKey===meta.projKey && d.filename!==file.name;
          });
          function saveNew(verCnt) {
            return dwgPut({
              id: meta.projKey+'_'+nowTs,
              filename:file.name, fileType:file.type||'application/pdf',
              fileSize:file.size, dataUrl:dataUrl,
              isoNo:meta.isoNo, tmpNo:meta.tmpNo, rev:meta.rev,
              projKey:meta.projKey, title:meta.title,
              uploadedAt:nowTs, pageCount:1, note:'',
              versionCount:verCnt||0, annotations:[]
            });
          }
          if (existing) {
            var verRec = { id:'ver_'+existing.id+'_'+nowTs,
              drawingId:existing.projKey, filename:existing.filename,
              fileType:existing.fileType, fileSize:existing.fileSize,
              dataUrl:existing.dataUrl, rev:existing.rev,
              uploadedAt:existing.uploadedAt, archivedAt:nowTs,
              note:'Rev.'+existing.rev+' 백업 ('+new Date(existing.uploadedAt).toLocaleDateString('ko-KR')+')'
            };
            verPut(verRec)
              .then(function(){ return dwgDelete(existing.id); })
              .then(function(){ return saveNew(existing.versionCount+1); })
              .then(function(){ count++; next(i+1); });
          } else {
            saveNew(0).then(function(){ count++; next(i+1); });
          }
        });
      };
      reader.readAsDataURL(file);
    }
    next(0);
  }

  // 뷰어 열기
  function openViewer(dwgId) {
    dwgGet(dwgId).then(function(d) {
      if (d) { setViewDwg(d); setScale(1.0); setPdfPage(1); setTotalPages(1); setEditAnnot(false); }
    });
  }

  // 주석 저장
  function saveAnnotations(annotObjs) {
    if (!viewDwg) return;
    var updated = Object.assign({}, viewDwg, { annotations: annotObjs });
    dwgPut(updated).then(function() {
      setViewDwg(updated);
      loadDrawings();
      showMsg('✅ 주석 저장 완료 ('+annotObjs.length+'개)',true);
    });
  }

  // 버전 이력
  function openVersions(projKey) {
    verGetByDrawing(projKey).then(function(vers) {
      vers.sort(function(a,b){ return b.archivedAt - a.archivedAt; });
      setViewVers({ projKey:projKey, list:vers });
    });
  }

  function restoreVersion(ver, curId) {
    if (!confirm('"'+ver.filename+'" 버전으로 복원?')) return;
    dwgGet(curId).then(function(cur) {
      if (!cur) return;
      var nowTs = Date.now();
      var back  = { id:'ver_'+curId+'_'+nowTs, drawingId:cur.projKey,
        filename:cur.filename, fileType:cur.fileType, fileSize:cur.fileSize,
        dataUrl:cur.dataUrl, rev:cur.rev, uploadedAt:cur.uploadedAt,
        archivedAt:nowTs, note:'복원 전 백업' };
      var rest = Object.assign({}, cur, {
        filename:ver.filename, fileType:ver.fileType, fileSize:ver.fileSize,
        dataUrl:ver.dataUrl, rev:ver.rev, uploadedAt:nowTs,
        versionCount:(cur.versionCount||0)+1 });
      verPut(back)
        .then(function(){ return dwgPut(rest); })
        .then(function(){ return verDelete(ver.id); })
        .then(function(){ loadDrawings(); setViewVers(null); showMsg('✅ 복원 완료',true); });
    });
  }

  function saveEditMeta(dwgId) {
    var m = editMeta[dwgId]; if (!m) return;
    dwgGet(dwgId).then(function(d) {
      if (!d) return;
      dwgPut(Object.assign({},d,m)).then(function(){
        var ne = Object.assign({},editMeta); delete ne[dwgId]; setEditMeta(ne);
        loadDrawings(); showMsg('저장 완료',true);
      });
    });
  }

  function deleteDwg(dwgId, projKey) {
    if (!confirm('도면을 삭제하시겠습니까? (백업 버전도 삭제)')) return;
    verGetByDrawing(projKey).then(function(vers){
      return Promise.all(vers.map(function(v){ return verDelete(v.id); }));
    }).then(function(){ return dwgDelete(dwgId); })
      .then(function(){ loadDrawings(); showMsg('삭제 완료',true); });
  }

  function fmtSize(b) {
    if (!b) return ''; return b<1024*1024 ? Math.round(b/1024)+'KB' : (b/1024/1024).toFixed(1)+'MB'; }
  function fmtDate(ts) {
    if (!ts) return '';
    return new Date(ts).toLocaleDateString('ko-KR',{month:'2-digit',day:'2-digit'})
      +' '+new Date(ts).toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}); }

  var groups = useMemo(function() {
    var q = searchQ.toLowerCase();
    var fil = drawings.filter(function(d) {
      var ms2 = !q||[d.filename,d.isoNo,d.tmpNo,d.title].some(function(v){
        return String(v||'').toLowerCase().indexOf(q)>=0; });
      var mg = filterGrp==='all'
        || (filterGrp==='iso'&&d.isoNo) || (filterGrp==='tmp'&&d.tmpNo)
        || (filterGrp==='other'&&!d.isoNo&&!d.tmpNo);
      return ms2&&mg;
    });
    var gMap = {};
    fil.forEach(function(d){
      var key=d.projKey||d.filename;
      if(!gMap[key]) gMap[key]={key,isoNo:d.isoNo,tmpNo:d.tmpNo,drawings:[]};
      gMap[key].drawings.push(d);
    });
    return Object.values(gMap).sort(function(a,b){
      return (b.drawings[0].uploadedAt||0)-(a.drawings[0].uploadedAt||0); });
  },[drawings,searchQ,filterGrp]);

  var inp = { padding:'8px 12px',background:C.navy,border:'1px solid '+C.border,
    borderRadius:7,color:C.white,fontSize:12 };

  // 줌 프리셋
  var ZOOM_PRESETS = [0.5, 0.75, 1.0, 1.25, 1.5, 2.0, 3.0];

  return h('div',{className:'fade'},

    // 헤더
    h('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}},
      h('div',null,
        h('h2',{style:{fontSize:17,fontWeight:800}},'도면 파일 관리'),
        h('div',{style:{fontSize:11,color:C.gray}},
          '총 '+drawings.length+'개 | 버전 관리 · PDF 뷰어 · 주석 편집')),
      h('label',{style:{padding:'9px 18px',
        background:'linear-gradient(90deg,'+C.blue+','+C.blueL+')',
        border:'none',borderRadius:8,color:'#fff',fontWeight:700,fontSize:13,
        cursor:'pointer',display:'flex',alignItems:'center',gap:6}},
        uploading?[h('span',{key:'s',className:'spin'},'⟳'),' 업로드 중...']:'📁 도면 업로드',
        !uploading&&h('input',{type:'file',multiple:true,
          accept:'.pdf,.png,.jpg,.jpeg,.gif,.tiff,.bmp',
          onChange:function(e){handleFiles(e.target.files);},
          style:{display:'none'}}))
    ),

    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}},
      h(KPI,{label:'전체 도면',value:drawings.length,color:C.blueL,icon:'📐'}),
      h(KPI,{label:'ISO 도면',value:drawings.filter(function(d){return d.isoNo;}).length,color:C.cyan,icon:'📄'}),
      h(KPI,{label:'백업 버전',value:drawings.reduce(function(s,d){return s+d.versionCount;},0),color:C.gold,icon:'💾'}),
      h(KPI,{label:'주석 있음',value:drawings.filter(function(d){return d.annotCount>0;}).length,color:C.green,icon:'✏'})
    ),

    msg&&h('div',{style:{padding:'9px 14px',borderRadius:8,marginBottom:12,
      background:msgClr+'18',border:'1px solid '+msgClr+'50',color:msgClr,fontSize:12}},msg),

    // 검색/필터
    h('div',{style:{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap',alignItems:'center'}},
      h('input',{value:searchQ,onChange:function(e){setSearchQ(e.target.value);},
        placeholder:'🔍 파일명, ISO No., 임시번호 검색...',
        style:Object.assign({},inp,{flex:'1 1 220px'})}),
      [['all','전체'],['iso','ISO'],['tmp','임시번호'],['other','기타']].map(function(f){
        var act=filterGrp===f[0];
        return h('button',{key:f[0],onClick:function(){setFilterGrp(f[0]);},
          style:{padding:'7px 14px',borderRadius:7,fontSize:12,
            background:act?C.blueL+'30':C.navyL,border:'1px solid '+(act?C.blueL:C.border),
            color:act?C.blueL:C.grayL,fontWeight:act?700:400,cursor:'pointer'}},f[1]);

      style:{border:'2px dashed '+(isDragOver?C.cyan:C.border),borderRadius:12,
        padding:48,textAlign:'center',background:isDragOver?C.cyan+'08':'transparent',
        transition:'all .2s'}},
      h('div',{style:{fontSize:40,marginBottom:12}},'📂'),
      h('div',{style:{fontSize:15,color:C.white,fontWeight:600,marginBottom:6}},

      h('div',{style:{fontSize:12,color:C.gray}},'PDF, PNG, JPG | 파일명에서 ISO No./Rev. 자동 인식 | 버전 자동 관리')

                  border:'1px solid '+(isPDF?C.red:C.blueL)+'40',

                h('div',{style:{flex:1,minWidth:0}},
                  isEd
                    ?h('div',{style:{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}},
                      [['title','제목',140],['isoNo','ISO No.',110],['tmpNo','임시번호',100],['rev','Rev.',55]].map(function(f){

                borderRadius:6,color:pdfPage<totalPages?C.blueL:C.gray,fontSize:13,cursor:'pointer'}},'▶')
          ),

          // ── 줌 컨트롤 (DrawingManager가 직접 소유)

            background:C.navy,borderRadius:8,padding:'4px 8px',border:'1px solid '+C.border}},
            h('button',{onClick:function(){setScale(function(s){return Math.max(0.25,+(s-0.25).toFixed(2));});},

              background:editAnnot?C.orange+'30':C.navyL,

          h('button',{onClick:function(){setViewDwg(null);},

        // 뷰어 본체
        h('div',{style:{flex:1,overflow:'hidden'}},

            onAnnotChange: function(annots){ handleAnnotChange(viewDwg.id, annots); }

    // ══ 버전 이력 모달
    viewVers&&h('div',{
      onClick:function(e){if(e.target===e.currentTarget)setViewVers(null);},
      style:{position:'fixed',inset:0,background:'#000000CC',zIndex:500,

      h('div',{style:{background:C.navyL,border:'1px solid '+C.border,
        borderRadius:14,padding:24,width:'min(90vw,520px)',

                ),

                      if(ver.dataUrl){var a=document.createElement('a');a.href=ver.dataUrl;a.download=ver.filename;a.click();}
                    },style:{padding:'5px 10px',background:C.green+'20',
                      border:'1px solid '+C.green+'40',borderRadius:6,color:C.green,fontSize:11}},'⬇'),
                  cur&&h('button',{onClick:function(){restoreVersion(ver,cur.id);},
                    style:{padding:'5px 10px',background:C.gold+'20',
                      border:'1px solid '+C.gold+'40',borderRadius:6,color:C.gold,fontSize:11}},'↩ 복원')
                )

}// ════════════════════════════════════════════════════════════════════════
// DrawingViewer v2 — PDF 뷰어 (정확한 스케일 + 주석 편집)
// ════════════════════════════════════════════════════════════════════════
function DrawingViewer(props) {
  var dataUrl     = props.dataUrl;
  var fileType    = props.fileType    || '';
  var filename    = props.filename    || '';
  var page        = props.page        || 1;
  var onPageCount = props.onPageCount || function(){};
  var annotations = props.annotations || [];
  var onAnnotChange = props.onAnnotChange || null;
  var freeTextAnnots = props.freeTextAnnots || []; // DB에 저장된 FreeText 어노테이션

  var canvasRef    = React.useRef(null);
  var containerRef = React.useRef(null);
  var pdfRef       = React.useRef(null);   // PDF 문서 캐시
  var renderRef    = React.useRef(null);   // 진행 중인 렌더 작업

  var sc = useState(1.0);    var scale    = sc[0]; var setScale    = sc[1];
  var ld = useState(false);  var loaded   = ld[0]; var setLoaded   = ld[1];
  var er = useState('');     var errMsg   = er[0]; var setErrMsg   = er[1];
  var fi = useState(false);  var fitDone  = fi[0]; var setFitDone  = fi[1];
  // 주석 모드
  var am = useState('none'); var annotMode = am[0]; var setAnnotMode = am[1]; // none|text|arrow|rect|marker
  var drawing = React.useRef(null); // 드래그 시작점
  var ns = useState(null);   var newAnnot  = ns[0]; var setNewAnnot  = ns[1]; // 그리는 중
  var ec = useState(null);   var editAnnot = ec[0]; var setEditAnnot = ec[1]; // 편집 중 주석 id

  var isPDF = fileType === 'application/pdf' || (filename && filename.match(/\.pdf$/i));

  // raw PDF에서 FreeText Contents 추출 (pdf.js XFA 파싱 오류 우회)
  // PDF 로드 (문서 캐시)
  React.useEffect(function() {
    if (!isPDF || !dataUrl || typeof pdfjsLib === 'undefined') return;
    setLoaded(false); setErrMsg(''); setFitDone(false);

    pdfjsLib.getDocument({
      url: dataUrl,
      CMapReaderFactory: InlineCMapReaderFactory,
      cMapPacked: true,
      includeAnnotationStorage: true
    }).promise.then(function(pdf) {
      pdfRef.current = pdf;
      onPageCount(pdf.numPages);

      return pdf.getPage(1);
    }).then(function(p) {
      var vp = p.getViewport({ scale: 1.0 });
      if (containerRef.current) {
        var cw = containerRef.current.clientWidth - 40;
        var fitScale = Math.min(Math.max(cw / vp.width, 0.3), 3);
        setScale(fitScale);
      }
      setFitDone(true);
    }).catch(function(e) {
      setErrMsg('PDF 로드 오류: ' + e.message);
      setLoaded(true);
    });
  }, [dataUrl]);

  // 페이지/스케일 변경 시 렌더링
  React.useEffect(function() {
    if (!isPDF || !pdfRef.current || typeof pdfjsLib === 'undefined') return;
    if (!fitDone) return; // fit 계산 완료 후에만 렌더

    // 이전 렌더 취소
    if (renderRef.current && renderRef.current.cancel) renderRef.current.cancel();
    setLoaded(false);

    var _pdfPage;
    pdfRef.current.getPage(page).then(function(pdfPage) {
      _pdfPage = pdfPage;
      // getAnnotations로 각 annotation의 rect 확보 (id→rect 매핑용)
      return pdfPage.getAnnotations().then(function(annots) {
        return {pdfPage: pdfPage, annots: annots};
      });
    }).then(function(r0) {
      var pdfPage = r0.pdfPage, annots = r0.annots;
      _pdfPage = pdfPage;
      var viewport = pdfPage.getViewport({ scale: scale });
      var canvas = canvasRef.current;
      if (!canvas) return;
      canvas.width  = viewport.width;
      canvas.height = viewport.height;
      var ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // id → annotation 정보 매핑 (FreeText만, rect+rotation 포함)
      var annotById = {};
      (annots || []).forEach(function(a) {
        if (a.id && a.rect && a.subtype === 'FreeText') {
          annotById[a.id] = a;
        }
      });

      var annotCanvasMap = new Map();
      var task = pdfPage.render({
        canvasContext: ctx,
        viewport: viewport,
        annotationMode: 1,
        annotationCanvasMap: annotCanvasMap
      });
      renderRef.current = task;
      return task.promise.then(function() {
        annotCanvasMap.forEach(function(annotCanvas, id) {
          if (!annotCanvas || annotCanvas.width === 0) return;
          var annot = annotById[id];
          if (!annot) return; // FreeText가 아닌 것(Stamp 등) skip

          var rect = annot.rect;
          var pt1 = viewport.convertToViewportPoint(rect[0], rect[1]);
          var pt2 = viewport.convertToViewportPoint(rect[2], rect[3]);
          var x  = Math.min(pt1[0], pt2[0]);
          var y  = Math.min(pt1[1], pt2[1]);
          var cw = Math.abs(pt2[0] - pt1[0]);
          var ch = Math.abs(pt2[1] - pt1[1]);

          ctx.save();
          var aw = annotCanvas.width;
          var ah = annotCanvas.height;
          var cwR = Math.round(cw);
          var chR = Math.round(ch);
          if (cwR > 0 && chR > 0) {
            var annotAspect = aw / ah;
            var rectAspect  = cwR / chR;
            if (Math.abs(annotAspect - rectAspect) < 0.3) {
              // 종횡비 일치 → 그냥 그리기
              ctx.drawImage(annotCanvas, Math.round(x), Math.round(y), cwR, chR);
            } else {
              // 뒤바뀜(rotate=90) → +90도 회전
              ctx.translate(Math.round(x), Math.round(y));
              ctx.rotate(Math.PI / 2);
              ctx.drawImage(annotCanvas, 0, -cwR, chR, cwR);
            }
          }
          ctx.restore();
        });
        setLoaded(true);
      });
    }).catch(function(e) {
      if (e && e.name === 'RenderingCancelledException') return;
      setErrMsg('렌더 오류: ' + (e && e.message));
      setLoaded(true);
    });
  }, [page, scale, fitDone]);

  // ── 주석 관련 이벤트 핸들러 ─────────────────────────────────────────
  function getCanvasPos(e) {
    var canvas = canvasRef.current;
    if (!canvas) return {x:0,y:0};
    var rect = canvas.getBoundingClientRect();
    return {
      x: (e.clientX - rect.left) / scale,
      y: (e.clientY - rect.top)  / scale
    };
  }

  function onCanvasMouseDown(e) {
    if (annotMode === 'none') return;
    e.preventDefault();
    var pos = getCanvasPos(e);
    drawing.current = pos;
    if (annotMode === 'text' || annotMode === 'marker') {
      // 클릭 즉시 생성
      var id = Date.now();
      var newA = {
        id: id, type: annotMode, x: pos.x, y: pos.y,
        text: annotMode === 'marker' ? '●' : '',
        color: annotMode === 'marker' ? '#FF4E5B' : '#FFD700',
        fontSize: 14, pageNo: page
      };
      if (annotMode === 'text') {
        setEditAnnot(id);
        newA.text = '';
      }
      onAnnotChange && onAnnotChange(annotations.concat([newA]));
    }
  }

  function onCanvasMouseMove(e) {
    if (annotMode === 'none' || !drawing.current) return;
    if (annotMode === 'arrow' || annotMode === 'rect') {
      var pos = getCanvasPos(e);
      setNewAnnot({ type:annotMode, x1:drawing.current.x, y1:drawing.current.y, x2:pos.x, y2:pos.y });
    }
  }

  function onCanvasMouseUp(e) {
    if (annotMode === 'none' || !drawing.current) return;
    var pos = getCanvasPos(e);
    var dx = Math.abs(pos.x - drawing.current.x);
    var dy = Math.abs(pos.y - drawing.current.y);
    if ((annotMode === 'arrow' || annotMode === 'rect') && (dx > 5 || dy > 5)) {
      var newA = {
        id: Date.now(), type: annotMode,
        x1: drawing.current.x, y1: drawing.current.y, x2: pos.x, y2: pos.y,
        color: annotMode === 'arrow' ? '#00C8E0' : '#F0A500',
        pageNo: page
      };
      onAnnotChange && onAnnotChange(annotations.concat([newA]));
    }
    drawing.current = null;
    setNewAnnot(null);
  }

  function deleteAnnot(id) {
    onAnnotChange && onAnnotChange(annotations.filter(function(a){ return a.id !== id; }));
  }

  function updateAnnotText(id, text) {
    onAnnotChange && onAnnotChange(annotations.map(function(a){
      return a.id === id ? Object.assign({}, a, {text:text}) : a;
    }));
  }

  // ── 캔버스 크기에 맞는 주석 위치 변환 (scale 적용)
  function toScreen(v) { return v * scale; }

  if (!dataUrl) {
    return h('div', { style:{display:'flex',alignItems:'center',justifyContent:'center',
      height:'100%',color:C.gray} }, '파일을 불러오는 중...');
  }

  // 이미지 뷰어
  if (!isPDF) {
    return h('div', { style:{height:'100%',overflow:'auto',padding:16,
      display:'flex',alignItems:'center',justifyContent:'center',background:'#1a1a2e'} },
      h('img', { src:dataUrl, alt:filename,
        style:{maxWidth:(scale*100)+'%',display:'block',
          boxShadow:'0 4px 20px #00000060',borderRadius:2} })
    );
  }

  if (typeof pdfjsLib === 'undefined') {
    return h('div', { style:{height:'100%',display:'flex',flexDirection:'column'} },
      h('div', {style:{padding:'8px 14px',background:C.gold+'18',fontSize:12,color:C.gold}},
        '⚠ PDF.js 로드 실패 — 브라우저 기본 뷰어로 표시'),
      h('iframe', {src:dataUrl+'#page='+page, style:{flex:1,border:'none'}})
    );
  }

  var pageAnnots = annotations.filter(function(a){ return a.pageNo === page; });
  var ANNOT_COLORS = { text:'#FFD700', arrow:'#00C8E0', rect:'#F0A500', marker:'#FF4E5B' };
  var ANNOT_LABELS = { none:'✋ 선택', text:'T 텍스트', arrow:'→ 화살표', rect:'□ 사각형', marker:'● 마커' };

  return h('div', { style:{height:'100%',display:'flex',flexDirection:'column'} },

    // ── 툴바
    h('div', { style:{display:'flex',gap:8,padding:'7px 12px',
      background:C.navyL,borderBottom:'1px solid '+C.border,flexWrap:'wrap',alignItems:'center'} },

      // 줌 컨트롤
      h('div', { style:{display:'flex',gap:4,alignItems:'center',
        background:C.navy,borderRadius:7,padding:'3px 6px',border:'1px solid '+C.border} },
        h('button', { onClick:function(){ setScale(Math.max(0.2, Math.round((scale-0.1)*10)/10)); },
          style:{padding:'2px 10px',background:'none',border:'none',color:C.grayL,
            fontSize:16,cursor:'pointer',fontWeight:700} }, '−'),
        h('span', { style:{fontSize:12,color:C.white,minWidth:46,textAlign:'center',
          fontFamily:"'IBM Plex Mono',monospace",fontWeight:600} },
          Math.round(scale*100)+'%'),
        h('button', { onClick:function(){ setScale(Math.min(4, Math.round((scale+0.1)*10)/10)); },
          style:{padding:'2px 10px',background:'none',border:'none',color:C.grayL,
            fontSize:16,cursor:'pointer',fontWeight:700} }, '+')
      ),
      // 프리셋
      ['맞춤','50%','75%','100%','150%','200%'].map(function(p) {
        var sv = p==='맞춤' ? null : parseFloat(p)/100;
        return h('button', { key:p,
          onClick:function(){
            if (p === '맞춤') {
              // fit-to-width 재계산
              if (!pdfRef.current || !containerRef.current) return;
              pdfRef.current.getPage(page).then(function(pg) {
                var vp = pg.getViewport({scale:1.0});
                var cw = containerRef.current.clientWidth - 40;
                setScale(Math.min(Math.max(cw/vp.width, 0.2), 4));
              });
            } else {
              setScale(sv);
            }
          },
          style:{padding:'3px 9px',background:Math.round(scale*100)===(sv?sv*100:0)?C.blueL+'40':C.navy,
            border:'1px solid '+C.border+'80',borderRadius:5,color:C.grayL,fontSize:11,cursor:'pointer'}
        }, p);
      }),

      h('div', { style:{width:1,height:20,background:C.border,margin:'0 4px'} }),

      // 주석 도구
      Object.keys(ANNOT_LABELS).map(function(mode) {
        var act = annotMode === mode;
        var clr = ANNOT_COLORS[mode] || C.blueL;
        return h('button', { key:mode,
          onClick:function(){ setAnnotMode(act && mode!=='none' ? 'none' : mode); },
          title: ANNOT_LABELS[mode],
