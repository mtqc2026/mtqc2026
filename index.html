// props: field, label, values(전체 고유값 배열), selected(Set), onChange(newSet)
function ColFilterDropdown(props) {
  var field    = props.field;
  var label    = props.label;
  var values   = props.values;   // 전체 고유값 배열 (전체 data 기준)
  var selected = props.selected; // Set: 비어있으면 전체 표시, 값있으면 해당값만 표시 (include)
  var onChange = props.onChange;

  var openSt   = useState(false); var open   = openSt[0];   var setOpen   = openSt[1];
  var srchSt   = useState('');    var srch   = srchSt[0];   var setSrch   = srchSt[1];
  var ref = React.useRef(null);

  // 외부 클릭 닫기
  React.useEffect(function() {
    if (!open) return;
    function handler(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
    document.addEventListener('mousedown', handler);
    return function(){ document.removeEventListener('mousedown', handler); };
  }, [open]);

  var isFiltered = selected && selected.size > 0 && selected.size < values.length;
  var dispValues = srch
    ? values.filter(function(v){ return String(v===null||v===undefined?'(빈값)':v).toLowerCase().indexOf(srch.toLowerCase()) >= 0; })
    : values;

  // include 방식: selected에 있는 값만 보임 (비어있으면 전체)
  function isChecked(v) {
    return !selected || selected.size === 0 || selected.has(v);
  }

  function toggle(v) {
    var cur = selected && selected.size > 0 ? new Set(selected) : new Set(values);
    if (cur.has(v)) cur.delete(v); else cur.add(v);
    if (cur.size === values.length) onChange(new Set()); // 전체 선택 = 필터 해제
    else onChange(cur);
  }

  function selectAll()  { onChange(new Set()); }          // 전체 선택 = 필터 해제
  function clearAll()   { onChange(new Set([])); setOpen(false); } // 전체 해제 = 아무것도 안 보임

  var isActive = isFiltered;
  var btnStyle = {
    display:'flex', alignItems:'center', gap:4,

    whiteSpace:'nowrap', userSelect:'none'
  };

  var activeCnt = selected && selected.size > 0 && selected.size < values.length
    ? selected.size : null;

  return h('div', { ref:ref, style:{ position:'relative', display:'inline-block' } },
    h('button', { onClick:function(){ setOpen(!open); setSrch(''); }, style:btnStyle },
      label,
      activeCnt !== null && h('span', { style:{ background:C.cyan, color:'#0A1628',
        borderRadius:8, padding:'1px 6px', fontSize:10, fontWeight:800, marginLeft:2 } }, activeCnt),
      h('span', { style:{ fontSize:8, marginLeft:2, opacity:0.7 } }, open ? '▲' : '▼')
    ),
    open && h('div', {
      style:{ position:'absolute', top:'calc(100% + 4px)', left:0, zIndex:999,
        minWidth:200, maxWidth:280, background:'#0C1A30',
        border:'1px solid '+C.blueL+'70', borderRadius:10,
        boxShadow:'0 12px 40px #00000090', overflow:'hidden' }
    },
      // 검색창
      h('div', { style:{ padding:'8px 10px', borderBottom:'1px solid '+C.border+'80' } },
        h('input', { value:srch, onChange:function(e){ setSrch(e.target.value); },
          placeholder:'🔍 값 검색...', autoFocus:true,
          style:{ width:'100%', padding:'6px 10px', background:C.navy,
            border:'1px solid '+C.border, borderRadius:7,
            color:C.white, fontSize:11, boxSizing:'border-box' } })
      ),
      // 전체선택 / 전체해제
      h('div', { style:{ display:'flex', gap:6, padding:'6px 10px',

        h('button', { onClick:selectAll,
          style:{ flex:1, padding:'5px', borderRadius:6, cursor:'pointer', fontSize:11,
            background:C.blueL+'25', border:'1px solid '+C.blueL+'50', color:C.blueL, fontWeight:600 } },
          '✓ 전체 선택'),

          style:{ flex:1, padding:'5px', borderRadius:6, cursor:'pointer', fontSize:11,
            background:C.red+'18', border:'1px solid '+C.red+'40', color:C.red } },
          '✕ 초기화')
      ),
      // 값 목록
      h('div', { style:{ maxHeight:240, overflowY:'auto', padding:'4px 0' } },
        dispValues.length === 0
          ? h('div', { style:{ padding:'16px', textAlign:'center', color:C.gray, fontSize:11 } }, '검색 결과 없음')
          : dispValues.map(function(v, idx) {

  );

// ════ dashboard ════
function Dashboard(props) {
  var data = props.data || [];

  var stats = useMemo(function() {
    var wJ = [];
    var byProj = {}, byType = {};
    var welded=0, ndeReq=0, ndeDone=0, rej=0, pending=0;
    var recentCands = [];

    data.forEach(function(d) {
      var isW = d.weldGubun === 'W' && d.status !== 'DELETED';
      if (isW) {
        wJ.push(d);
        byType[d.weldType] = (byType[d.weldType] || 0) + 1;
        if (!byProj[d.project]) byProj[d.project] = {total:0, welded:0, ndeDone:0, rej:0};
        byProj[d.project].total++;

        // 용접완료 = fitupDate + visualDate + welder 모두 있음
        var isWelded = !!(d.fitupDate && d.visualDate && d.welder);
        if (isWelded) {
          welded++;
          byProj[d.project].welded++;
        }
        // NDE 의뢰: 의뢰번호 있음
        var hasReq = !!(d.rtReqNo || d.ptReqNo);
        // NDE 완료: 성적서 있거나 status가 완료
        var hasDone = !!(d.rtRptNo || d.ptRptNo ||
                         d.status==='NDE_DONE' || d.status==='COMPLETE');
        if (hasReq) ndeReq++;
        if (hasDone) {
          ndeDone++;
          byProj[d.project].ndeDone++;
        }
        // 불합격
        if (d.status==='REJECTED') {
          rej++;
          byProj[d.project].rej++;
        }
        // 미착수 (용접도 안됨)
        if (!isWelded) pending++;
      }
      if (d.fitupDate || d.visualDate) recentCands.push(d);
    });

    var total     = wJ.length;
    // 진행률 = 용접완료 기준 (공정현황과 동일)
    var weldPct   = total ? Math.round(welded / total * 100) : 0;
    var ndePct    = total ? Math.round(ndeDone / total * 100) : 0;
    var ndeReqPct = total ? Math.round(ndeReq  / total * 100) : 0;

    var recent = recentCands.sort(function(a,b){
      var da = b.visualDate||b.fitupDate||'', db = a.visualDate||a.fitupDate||'';
      return da > db ? 1 : -1;
    }).slice(0,6);

    return {
      wJ:wJ, total:total,
      welded:welded, weldPct:weldPct,
      ndeReq:ndeReq, ndeReqPct:ndeReqPct,
      ndeDone:ndeDone, ndePct:ndePct,
      rej:rej, pending:pending,
      byProj:byProj, byType:byType, recent:recent
    };
  }, [data]);

  var r    = 42;
  var circ = 2 * Math.PI * r;

  // 원형 게이지 (진행률 레이어 2개: 용접완료 + NDE완료)
  function DonutChart() {
    var wPct = stats.weldPct;
    var nPct = stats.ndePct;
    return h('div',{style:{position:'relative',width:100,height:100,flexShrink:0}},
      h('svg',{width:100,height:100,style:{transform:'rotate(-90deg)'}},
        // 배경
        h('circle',{cx:50,cy:50,r:r,fill:'none',stroke:C.border,strokeWidth:8}),
        // NDE 완료 (안쪽, 가는 선)
        h('circle',{cx:50,cy:50,r:r-5,fill:'none',stroke:C.green+'60',strokeWidth:3,
          strokeDasharray: 2*Math.PI*(r-5),
          strokeDashoffset: 2*Math.PI*(r-5)*(1-nPct/100),
          strokeLinecap:'round'}),
        // 용접완료 (바깥, 두꺼운 선)
        h('circle',{cx:50,cy:50,r:r,fill:'none',stroke:C.cyan,strokeWidth:8,
          strokeDasharray: circ,
          strokeDashoffset: circ*(1-wPct/100),
          strokeLinecap:'round',
          style:{transition:'stroke-dashoffset 1s ease'}})
      ),
      h('div',{style:{position:'absolute',inset:0,display:'flex',
        flexDirection:'column',alignItems:'center',justifyContent:'center'}},
        h('span',{style:{fontSize:19,fontWeight:800,color:C.cyan,
          fontFamily:"'IBM Plex Mono',monospace",lineHeight:1}}, wPct+'%'),
        h('span',{style:{fontSize:9,color:C.gray,marginTop:2}},'용접완료')
      )
    );
  }

  return h('div',{className:'fade'},

    // ── KPI 카드
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(130px,1fr))',gap:12,marginBottom:20}},
      h(KPI,{label:'전체(W)',    value:stats.total,    color:C.blueL,  icon:'⬡'}),
      h(KPI,{label:'용접완료',   value:stats.welded,   color:C.cyan,   icon:'🔥', sub:stats.weldPct+'%'}),
      h(KPI,{label:'NDE 의뢰',  value:stats.ndeReq,   color:C.gold,   icon:'📋', sub:stats.ndeReqPct+'%'}),
      h(KPI,{label:'NDE 완료',  value:stats.ndeDone,  color:C.green,  icon:'✅', sub:stats.ndePct+'%'}),
      h(KPI,{label:'불합격',    value:stats.rej,      color:C.red,    icon:'❌'}),
      h(KPI,{label:'미착수',    value:stats.pending,  color:C.gray,   icon:'⬜'})
    ),

    // ── 진행률 + 프로젝트
    h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}},

      // 원형 진행률
      h('div',{style:baseBox},

                  stats.welded+'/'+stats.total)
              ),
              h(ProgressBar,{pct:stats.weldPct,color:C.cyan})
            ),
            h('div',null,
              h('div',{style:{display:'flex',justifyContent:'space-between',
                fontSize:11,marginBottom:3}},
                h('span',{style:{color:C.gold,fontWeight:600}},'📋 NDE 의뢰'),
                h('span',{style:{color:C.grayL,fontFamily:"'IBM Plex Mono',monospace"}},
                  stats.ndeReq+'/'+stats.total)
              ),
              h(ProgressBar,{pct:stats.ndeReqPct,color:C.gold})
            ),
            h('div',null,
              h('div',{style:{display:'flex',justifyContent:'space-between',

                h('span',{style:{color:C.green,fontWeight:600}},'✅ NDE 완료'),

                  stats.ndeDone+'/'+stats.total)
              ),
              h(ProgressBar,{pct:stats.ndePct,color:C.green})
            ),
            stats.rej > 0 && h('div',null,
              h('div',{style:{display:'flex',justifyContent:'space-between',
                fontSize:11,marginBottom:3}},
                h('span',{style:{color:C.red,fontWeight:600}},'❌ 불합격'),
                h('span',{style:{color:C.grayL,fontFamily:"'IBM Plex Mono',monospace"}},
                  stats.rej)
              ),
              h(ProgressBar,{pct:stats.total?Math.round(stats.rej/stats.total*100):0,color:C.red})
            )
          )
        ),
        // 상태 범례
        h('div',{style:{display:'flex',flexWrap:'wrap',gap:8}},
          Object.keys(STATUS).map(function(k){
            var cnt=data.filter(function(d){return d.status===k;}).length;

      // 프로젝트별
      h('div',{style:Object.assign({},baseBox,{overflowY:'auto',maxHeight:320})},
        h('div',{style:{fontSize:12,fontWeight:700,color:C.grayL,
          letterSpacing:'.08em',textTransform:'uppercase',marginBottom:14}},
          '프로젝트별 현황 (용접완료 기준)'),
        h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          Object.keys(stats.byProj)
            .sort(function(a,b){

              return pctB - pctA;
            })
            .map(function(proj){
              var p   = stats.byProj[proj];

              })

    )

                  : row.status==='REJECTED' ? '#1C0808'
                  : (row.status==='COMPLETE'||row.status==='NDE_DONE') ? '#051A0E'
                  : i%2===0 ? C.navyL+'45' : 'transparent';

                return h('tr',{key:row.id,
                  style:{
                    background:rowBg, height:ROW_H,
                    opacity:(isDeleted||isCancelled)?0.72:1,
                    position:'relative',
                    borderLeft:(isDeleted||isCancelled)?'3px solid '+C.red:'none'
                  },
                  onMouseEnter:function(e){if(!dragStart)e.currentTarget.style.background=(isDeleted||isCancelled)?'#3A0808':C.steel+'20';},
                  onMouseLeave:function(e){if(!dragStart)e.currentTarget.style.background=rowBg;}
                },
                  // ★ 취소선 레이어: 빨간 중간 라인
                  (isDeleted||isCancelled) && h('td',{
                    colSpan:COLS.length+1,
                    style:{position:'absolute',left:0,right:0,top:'50%',height:2,
                      background:'rgba(220,30,30,0.7)',pointerEvents:'none',

                    isCancelled ? h('span',{style:{fontSize:8,color:C.red,display:'block',lineHeight:1.1}},
                      (isDeleted?'DEL':'CNL')) : i+1
                  ),

                  COLS.map(function(c){
                    var f=c[0],editable=c[4],val=row[f];
                    var w=colWidths[f]||c[3],ck=cellKey(row.id,f);
                    var isSel=selCells.has(ck);
                    var isActive=editCell&&editCell.rowId===row.id&&editCell.field===f;
                    var fr=frozenCols.has(f),clr=cellClr(f,val);
                    var display=(val===null||val===undefined||val==='')?'':String(val);
                    var colFq=colFilters[f]?colFilters[f].toLowerCase():'';
                    var hlStart=colFq&&display?display.toLowerCase().indexOf(colFq):-1;

                    var tdSt=Object.assign({},tdBase,{width:w,minWidth:w,maxWidth:w,
                      color:isSel?C.navy:clr,
                      background:isSel?C.cyan:(fr?(i%2===0?C.steel:'#0D1E38'):(hlStart>=0?C.cyan+'08':undefined)),
                      fontWeight:(f==='jointNo'||f==='weldGubun')?700:400,
                      cursor:editable?'cell':'default',padding:'0 7px',
                      boxShadow:isSel?'inset 0 0 0 2px '+C.blueL:fr?'inset -2px 0 0 '+C.blueL+'30':undefined});
                    if(fr)tdSt=Object.assign(tdSt,{position:'sticky',left:frozenOffsets[f],zIndex:3});

                    if(isActive&&editable){
                      return h('td',{key:f,style:Object.assign({},tdSt,{
                        padding:0,outline:'2px solid '+C.cyan,outlineOffset:'-2px',
                        background:'#0A2040',zIndex:fr?10:5})},
                        h('input',{autoFocus:true,
                          type:f.indexOf('Date')>=0?'date':'text',
                          value:editVal,
                          onChange:function(e){setEditVal(e.target.value);},
                          onBlur:commitCell,onKeyDown:handleKeyDown,
                          style:{width:'100%',height:'100%',minHeight:ROW_H,
                            padding:'0 7px',background:'transparent',
                            border:'none',color:C.white,fontSize:11,display:'block'}}));
                    }

                    var cellContent;
                    if(f==='status'){
                      cellContent=h(SBadge,{status:row.status});
                    }else if(f==='welder'&&display&&display!=='-'){
                      cellContent=h(WelderTooltip,{welderId:display},
                        h('span',{style:{borderBottom:'1px dashed '+C.blueL+'80',cursor:'default'}},display));
                    }else if(hlStart>=0){
                      cellContent=h('span',null,
                        display.slice(0,hlStart),

                    return h('td',{key:f,
                      onMouseDown:editable?function(e){onCellMouseDown(e,row.id,f);}:undefined,
                      onMouseEnter:editable?function(){onCellMouseEnter(row.id,f);}:undefined,
                      onClick:(!hasSel&&editable)?function(){startCellEdit(row.id,f,val);}:undefined,
                      style:tdSt},cellContent);
                  })

              }),

              // 하단 패딩
              botPad>0&&h('tr',{key:'bp',style:{height:botPad,display:'table-row'}},

      ),

      // 빈 상태
      filtered.length===0&&h('div',{style:{
        position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',
        textAlign:'center',color:C.gray}},

    ),

    // 범례
    h('div',{style:{marginTop:8,padding:'6px 14px',background:C.navyL,
      borderRadius:8,border:'1px solid '+C.border,
      fontSize:11,color:C.gray,display:'flex',flexWrap:'wrap',gap:14,alignItems:'center'}},

        (Array.from(frozenCols).map(function(f){var c=COLS.find(function(x){return x[0]===f;});return c?c[1]:f;}).join(', ')||'없음')),
      h('span',null,'|'),

      h('span',{style:{color:C.cyan}},'🔵 W'),h('span',{style:{color:C.red+'bb'}},'🔴 불합격'),
      h('span',{style:{marginLeft:'auto',color:C.gray}},
        '가상스크롤 '+filtered.length.toLocaleString()+'행 | 렌더 '+(endIdx-startIdx)+'행')
    )

}


function exportCSV(data) {
  var headers = [
    'AREA','임시번호','Project','PKG No.','Line No.','ISO No.','REV.','Joint No.',
    'System','Welding Type','Shop/Field','Size','Sch','Thick','Mat.Class','Mat1','Mat2',
    'Fit-up Date','Visual Date','Welder','NDE RT%','NDE PT%','PWHT',
    'RT 의뢰번호','RT 의뢰일','RT 성적서번호','RT 수령일',
    'PT 의뢰번호','PT 의뢰일','PT 성적서번호','PT 수령일',
    'Oper P','Oper T','Des P','Des T','Test P','Medium',
    'Insul Type','Insul Thk','Paint Code','Supt Type','Remark','용접구분','Status'
  ];
  var rows = data.map(function(d) {
    return [
      d.area, d.tmpNo, d.project, d.pkg, d.lineNo, d.isoNo, d.rev, d.jointNo,
      d.system, d.weldType, d.shopField, d.size, d.sch, d.thick, d.matClass, d.mat1, d.mat2,
      d.fitupDate||'', d.visualDate||'', d.welder||'', d.ndeRT, d.ndePT, d.pwht,
      d.rtReqNo||'', d.rtReqDate||'', d.rtRptNo||'', d.rtRptDate||'',
      d.ptReqNo||'', d.ptReqDate||'', d.ptRptNo||'', d.ptRptDate||'',
      d.operP, d.operT, d.desP, d.desT, d.testP, d.medium,
      d.insulType, d.insulThk, d.paintCode, d.suptType, d.remark, d.weldGubun, d.status
    ];
  });
  var csv = [headers].concat(rows).map(function(r) {
    return r.map(function(v) { return '"' + String(v === null || v === undefined ? '' : v) + '"'; }).join(',');
  }).join('\n');
  var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'weld_log_' + today() + '.csv'; a.click();
  URL.revokeObjectURL(url);
}

  // ── 페이지네이션
  var pg = useState(1);    var page     = pg[0]; var setPage     = pg[1];
  var ps = useState(15);   var pageSize = ps[0]; var setPageSize = ps[1];

  var isoList = useMemo(function() {
    var seen={},list=['all'];
    data.forEach(function(d){if(!seen[d.isoNo]){seen[d.isoNo]=true;list.push(d.isoNo);}});
    return list;
  },[data]);

  // 전체 data 기준 열 고유값 (필터 드롭다운용)
  var jColValues = useMemo(function() {
    var res = {};
    ['weldType','shopField','matClass','welder','status','weldGubun','size','pwht'].forEach(function(f) {
      var seen={}, vals=[];
      data.forEach(function(d){ var v=d[f]; var k=String(v==null?'':v); if(!seen[k]){seen[k]=1;vals.push(v);} });
      res[f] = vals.sort(function(a,b){ return String(a||'').localeCompare(String(b||'')); });
    });
    return res;
  }, [data]);

  function setJColFilter(field, excludeSet) {
    setJColFilters(function(prev) {
      var upd = Object.assign({}, prev);
      if (!excludeSet || excludeSet.size === 0) delete upd[field];
      else upd[field] = excludeSet;
      return upd;
    });
    setPage(1);
  }
  function clearAllJColFilters() { setJColFilters({}); setPage(1); }
  var jActiveFilters = Object.keys(jColFilters).filter(function(k){ return jColFilters[k]&&jColFilters[k].size>0; });

  var filtered = useMemo(function() {
    var q=search.toLowerCase().trim();
    return data.filter(function(d) {
      if(q){
        var hit=false;
        var keys=Object.keys(d);
        for(var ki=0;ki<keys.length;ki++){
          var v=d[keys[ki]];
          if(v!==null&&v!==undefined&&v!==''&&String(v).toLowerCase().indexOf(q)>=0){hit=true;break;}
        }
        if(!hit)return false;
      }
      if(fISO!=='all'&&d.isoNo!==fISO) return false;
      if(fStat==='CANCELLED'){if(!isCancelledRow(d))return false;}
      else if(fStat!=='all'&&d.status!==fStat) return false;
      if(fGub!=='all'&&d.weldGubun!==fGub) return false;
      // 열 필터 적용
      // 열 필터 (include 방식: selected에 값이 있으면 해당값만 통과)
      var cfKeys = Object.keys(jColFilters);
      for(var ci=0;ci<cfKeys.length;ci++){
        var fld = cfKeys[ci];
        var incSet = jColFilters[fld];
        if(incSet && incSet.size > 0) {
          if(!incSet.has(d[fld])) return false;
        }

  );
}

// ════ nde_mgmt ════
function NDEManagement(props) {
  var data    = props.data;
  var setData = props.setData;

  var typeState = useState('PT'); var type   = typeState[0]; var setType   = typeState[1];
  var editState = useState(null); var editId = editState[0]; var setEditId = editState[1];
  var formState = useState({});   var form   = formState[0]; var setForm   = formState[1];
  var tabState  = useState('due');var tabV   = tabState[0];  var setTabV   = tabState[1]; // 'due' | 'all'
  var ndePg     = useState(1);    var ndePage = ndePg[0];    var setNdePage = ndePg[1];
  var NDE_PAGE_SIZE = 15;

  // ── NDE 대상 산정 로직 ─────────────────────────────────────────────────
  // 규칙:
  //   1. 임시번호(tmpNo) + NDE%(ndePT 또는 ndeRT)가 같은 그룹을 묶는다
  //   2. 그룹 내 용접완료(fitupDate + visualDate + welder 모두 입력)된 조인트 수가
  //      NDE% 기준을 초과하면 → 그 조인트들 중 미검사 대상을 NDE 필요로 표시
  //   3. NDE 100%는 용접완료된 모든 조인트가 검사 대상
  //   4. 이미 의뢰번호 있으면 의뢰완료, 성적서번호 있으면 검사완료

  var ndeCalc = useMemo(function() {
    // ── 필드 결정
    var isPtType   = (type==='PT'||type==='MT');
    var pctField   = isPtType ? 'ndePT' : 'ndeRT';
    var reqField   = isPtType ? 'ptReqNo'  : 'rtReqNo';
    var rptField   = isPtType ? 'ptRptNo'  : 'rtRptNo';

    // NDE% 파싱: '-', '', null, undefined → 0
    function parsePct(v) {
      if (v===null||v===undefined||v===''||String(v).trim()==='-') return 0;
      var n = Number(v);
      return isNaN(n) ? 0 : n;
    }

    // 숫자로 시작하면 숫자 joint
    function isNumericJoint(jn) { return /^\d/.test(String(jn||'')); }

    // 용접완료 판정
    function isWeldedFn(d) { return !!(d.fitupDate && d.visualDate && d.welder); }

    // size → 인치 숫자 파싱
    function parseSize(s) {
      if (s === null || s === undefined || s === '') return null;
      var n = parseFloat(String(s));
      return isNaN(n) ? null : n;
    }

    // size 기반 NDE 타입 판별
    // 2인치 미만 → PT/MT (isPtType=true 탭)
    // 2인치 이상 → RT/PAUT (isPtType=false 탭)
    // size 없음 → weldType 기반: BW → RT, 그 외 → PT
    function isRowForThisTab(d) {
      var sz = parseSize(d.size);
      if (sz !== null) {
        // size 있음: 2인치 기준
        return isPtType ? (sz < 2) : (sz >= 2);
      }
      // size 없음: weldType 기반
      var wt = String(d.weldType || '').trim().toUpperCase();
      var isBW = (wt === 'BW');
      return isPtType ? !isBW : isBW;
    }

    // 대상 행: 용접구분W, 삭제 아닌 것, 이 탭에 해당하는 size
    var weldRows = data.filter(function(d) {
      if (d.weldGubun !== 'W' || d.status === 'DELETED') return false;
      return isRowForThisTab(d);
    });

    // tmpNo 기준 그룹핑
    var tmpGroups = {};
    weldRows.forEach(function(d) {
      var k = d.tmpNo || '(미입력)';
      if (!tmpGroups[k]) tmpGroups[k] = [];
      tmpGroups[k].push(d);
    });

    var dueRows = [], allRows = [];

    Object.keys(tmpGroups).forEach(function(tmpNo) {
      var joints     = tmpGroups[tmpNo];
      var numJoints  = joints.filter(function(d){ return isNumericJoint(d.jointNo); });
      var alphaJoints= joints.filter(function(d){ return !isNumericJoint(d.jointNo); });

      // ════ 숫자 Joint 처리 ════
      // 동일 NDE% 값끼리 서브그룹 형성
      var numGroups = {};
      numJoints.forEach(function(d) {
        var pct = parsePct(d[pctField]);
        var key = String(pct);
        if (!numGroups[key]) numGroups[key] = { pct:pct, joints:[] };
        numGroups[key].joints.push(d);
      });

      Object.keys(numGroups).forEach(function(subKey) {
        var sg    = numGroups[subKey];
        var pct   = sg.pct;
        if (pct === 0) return; // NDE 대상 아님

        var is100 = pct >= 100;
        var total = sg.joints.length;

        // 필요 검사 수: ceil(총수 × NDE%) — 버퍼 없음, 최소 1
        var required = is100 ? total : Math.max(1, Math.ceil(total * pct / 100));

        var welded     = sg.joints.filter(isWeldedFn);
        var alreadyReq = sg.joints.filter(function(d){ return !!d[reqField]; }).length;
        var alreadyRpt = sg.joints.filter(function(d){ return !!d[rptField]; }).length;

        // ▶ 그룹 완료 여부:
        //   의뢰 수(alreadyReq) >= 필요수 → 그룹 NDE 완료
        //   100%인 경우 개별 판단
        var groupDone    = !is100 && (alreadyReq >= required);
        var groupTriggered = welded.length >= required; // 트리거: 용접완료 수 기준

        sg.joints.forEach(function(d) {
          var hasReq  = !!d[reqField];
          var hasRpt  = !!d[rptField];
          var weld    = isWeldedFn(d);
          var isDone  = hasReq || groupDone; // 개별 의뢰 있거나 그룹 완료면 done

          var needNDE;
          if (is100) {
            // 100%: 용접완료된 모든 joint 개별 검사 필요
            needNDE = weld && !hasReq;
          } else if (groupDone) {
            // 그룹 완료: 아무도 needNDE 없음
            needNDE = false;
          } else {
            // 그룹 미완료: 트리거 됐고, 용접완료이고, 아직 의뢰 안 된 것
            needNDE = groupTriggered && weld && !hasReq;
          }

          // PWHT=Y + PT/MT 탭이면 PWHT 후 PT/MT 추가 필요
          var needPwhtPT = (isPtType && String(d.pwht||'').toUpperCase()==='Y' && weld && !hasReq);
          if (needPwhtPT) needNDE = true;

          var rowInfo = Object.assign({}, d, {
            _group:      tmpNo + '__num__' + subKey,
            _tmpNo:      tmpNo,
            _pct:        pct,
            _total:      total,
            _welded:     welded.length,
            _required:   required,
            _alreadyReq: alreadyReq,
            _alreadyRpt: alreadyRpt,
            _needNDE:    needNDE,
            _isDone:     isDone,
            _groupDone:  groupDone,
            _is100:      is100,
            _triggered:  groupTriggered,
            _jointType:  'numeric',
            _needPwhtPT: needPwhtPT
          });

          if (weld || hasReq || hasRpt) {
            allRows.push(rowInfo);
            if (needNDE) dueRows.push(rowInfo);
          }
        });
      });

      // ════ 영문 Joint 처리 ════
      // 개별 판단: 의뢰번호 있으면 완료, 없으면 필요
      alphaJoints.forEach(function(d) {
        var pct  = parsePct(d[pctField]);
        // PWHT 대상 아니고 NDE%=0이면 제외
        if (pct === 0 && !(isPtType && String(d.pwht||'').toUpperCase()==='Y')) return;

        var is100   = pct >= 100;
        var hasReq  = !!d[reqField];
        var hasRpt  = !!d[rptField];
        var weld    = isWeldedFn(d);
        var isDone  = hasReq;

        var needNDE;
        if (pct === 0) {
          needNDE = false;
        } else if (is100) {
          needNDE = weld && !hasReq;
        } else {
          // 부분 검사: 의뢰번호 있으면 완료, 없으면 필요
          needNDE = weld && !hasReq;
        }

        var needPwhtPT = (isPtType && String(d.pwht||'').toUpperCase()==='Y' && weld && !hasReq);
        if (needPwhtPT) needNDE = true;

        var rowInfo = Object.assign({}, d, {
          _group:      tmpNo + '__alpha__' + String(d.jointNo),
          _tmpNo:      d.tmpNo || '(미입력)',
          _pct:        pct,
          _total:      1,
          _welded:     weld ? 1 : 0,
          _required:   1,
          _alreadyReq: hasReq ? 1 : 0,
          _alreadyRpt: hasRpt ? 1 : 0,
          _needNDE:    needNDE,
          _isDone:     isDone,
          _groupDone:  isDone,
          _is100:      is100,
          _triggered:  weld,
          _jointType:  'alpha',
          _needPwhtPT: needPwhtPT
        });

        if (weld || hasReq || hasRpt) {
          allRows.push(rowInfo);
          if (needNDE) dueRows.push(rowInfo);
        }
      });
    });

    function sortRows(arr) {
      return arr.slice().sort(function(a, b) {
        if (a._tmpNo < b._tmpNo) return -1;
        if (a._tmpNo > b._tmpNo) return 1;
        var aj = String(a.jointNo || ''), bj = String(b.jointNo || '');
        var an = parseInt(aj), bn = parseInt(bj);
        if (!isNaN(an) && !isNaN(bn)) return an - bn;
        return aj < bj ? -1 : aj > bj ? 1 : 0;
      });
    }

    var reqDone = data.filter(function(d){ return d.weldGubun==='W' && !!d[reqField]; }).length;
    var rptDone = data.filter(function(d){ return d.weldGubun==='W' && !!d[rptField]; }).length;

    return {
      dueRows:  sortRows(dueRows),
      allRows:  sortRows(allRows),
      reqDone:  reqDone,
      rptDone:  rptDone,
      reqField: reqField,
      rptField: rptField,
      pctField: pctField
    };
  }, [data, type]);

  var activeRows = tabV === 'due' ? ndeCalc.dueRows : ndeCalc.allRows;
  var ndeCf = useState({}); var ndeColFilters = ndeCf[0]; var setNdeColFilters = ndeCf[1];

  function setNdeColFilter(field, excludeSet) {
    var upd = Object.assign({}, ndeColFilters);
    if (!excludeSet || excludeSet.size === 0) delete upd[field];
    else upd[field] = excludeSet;
    setNdeColFilters(upd);
    setNdePage(1);
  }

  var ndeFilteredRows = useMemo(function() {
    var cfKeys = Object.keys(ndeColFilters);
    if (cfKeys.length === 0) return activeRows;
    return activeRows.filter(function(d) {
      // 열 필터 (include 방식)
      for(var ci=0;ci<cfKeys.length;ci++){
        var fld=cfKeys[ci], inc=ndeColFilters[fld];
        if(inc&&inc.size>0&&!inc.has(d[fld])) return false;
      }
      return true;
    });
  }, [activeRows, ndeColFilters]);

  var ndeColValues = useMemo(function() {
    var res={};
    ['_tmpNo','isoNo','weldType','shopField','welder','status'].forEach(function(f){
      var seen={},vals=[];
      activeRows.forEach(function(d){ var v=d[f]; var k=String(v==null?'':v); if(!seen[k]){seen[k]=1;vals.push(v);} });
      res[f]=vals.sort(function(a,b){return String(a||'').localeCompare(String(b||''));});
    });
    return res;
  }, [activeRows]);

  var ndeTotalPages = 1;
  var ndePageRows   = ndeFilteredRows; // 전체 표시 - 스크롤
  React.useEffect(function(){ setNdePage(1); }, [tabV, type]);

  function startEdit(row) { setEditId(row.id); setForm(Object.assign({}, row)); }
  function saveEdit() {
    setData(data.map(function(d) {
      if (d.id !== editId) return d;
      var hasRpt = type === 'PT' ? form.ptRptNo : form.rtRptNo;
      var hasReq = type === 'PT' ? form.ptReqNo : form.rtReqNo;
      var newStatus = hasRpt ? 'NDE_DONE' : hasReq ? 'NDE_REQ' : d.status;
      return Object.assign({}, d, form, { status: newStatus });
    }));
    setEditId(null);
  }

  function fInp(fk, tp) {
    return h(TextInput, {
      value: form[fk] || '',
      type:  tp || 'text',
      onChange: function(v) {
        var upd = Object.assign({}, form); upd[fk] = v; setForm(upd);
      }

// ── 공정 현황 ──────────────────────────────────────────────────────────────

// ════ progress ════
function ProgressView(props) {
  var data       = props.data || [];
  var repairData = props.repairData || [];

  var vm  = useState('tmpNo'); var viewMode = vm[0];  var setViewMode = vm[1];
  var sq  = useState('');     var searchQ  = sq[0];  var setSearchQ  = sq[1];
  var sf  = useState('all');  var filterSt = sf[0];  var setFilterSt = sf[1];
  // openSet: 펼쳐진 키들
  var op  = useState(new Set()); var openSet = op[0]; var setOpenSet  = op[1];
  // 스크롤 위치 (ref로 추적, setState 안 씀 → 리렌더 최소화)
  var scrollTopRef   = React.useRef(0);
  var scrollTrigger  = useState(0); var forceUpdate = function(){ scrollTrigger[1](function(n){ return n+1; }); };
  var containerRef   = React.useRef(null);

  // 고정 상수
  var ITEM_H      = 52;
  var BUBBLE_BASE = 54;
  var BUBBLE_H    = 34;
  var BUBBLE_COLS = 22;
  var OVERSCAN    = 4;
  var CONTAINER_H = Math.max(400, window.innerHeight - 330);

  function toggleOpen(key) {
    setOpenSet(function(prev) {
      var n = new Set(prev);
      n.has(key) ? n.delete(key) : n.add(key);
      return n;
    });
  }

  // ── Repair Set
  var repairSet = useMemo(function() {
    var s = new Set();
    repairData.forEach(function(r) {
      if (r.isoNo && r.jointNo) s.add(r.isoNo+'__'+r.jointNo);
    });
    return s;
  }, [repairData]);

  function isWelded(j) { return !!(j.fitupDate && j.visualDate && j.welder); }
  function isDone(j)   { return j.status==='NDE_DONE'||j.status==='COMPLETE'; }
  function isInProg(j) { return j.status==='FITUP'||j.status==='VISUAL'||j.status==='NDE_REQ'; }
  function isRej(j)    { return j.status==='REJECTED'; }
  function isRepair(j) { return repairSet.has(j.isoNo+'__'+j.jointNo); }

  // ── 그룹 집계
  var baseList = useMemo(function() {
    var gk = viewMode==='iso' ? 'isoNo' : 'tmpNo';
    var map = {};
    data.forEach(function(d) {
      var key = d[gk] || '(미입력)';
      if (!map[key]) map[key] = {
        key: key,
        sub: viewMode==='iso' ? (d.lineNo||'') : (d.project||''),
        joints: []
      };
      map[key].joints.push(d);
    });
    return Object.values(map).map(function(g) {
      var wJ     = g.joints.filter(function(j){ return j.weldGubun==='W'; });
      var total  = wJ.length;
      var welded = wJ.filter(isWelded).length;
      var done   = wJ.filter(isDone).length;
      var inP    = wJ.filter(isInProg).length;
      var rej    = wJ.filter(isRej).length;
      var repair = wJ.filter(isRepair).length;
      var pct    = total ? Math.round(welded/total*100) : 0;
      return Object.assign({}, g, {wJ:wJ,total:total,welded:welded,
        done:done,inP:inP,rej:rej,repair:repair,pct:pct});
    }).sort(function(a,b){ return a.key < b.key ? -1 : 1; });
  }, [data, repairSet, viewMode]);

  var filtered = useMemo(function() {
    var q = searchQ.toLowerCase();
    return baseList.filter(function(g) {
      if (q && g.key.toLowerCase().indexOf(q)<0 && g.sub.toLowerCase().indexOf(q)<0) return false;
      if (filterSt==='done'    && g.pct!==100)       return false;
      if (filterSt==='active'  && !(g.pct>0&&g.pct<100)) return false;
      if (filterSt==='pending' && g.pct!==0)         return false;
      if (filterSt==='reject'  && g.rej===0)         return false;
      if (filterSt==='repair'  && g.repair===0)      return false;
      return true;
    });
  }, [baseList, searchQ, filterSt]);

  var summary = useMemo(function() {
    var t=0,w=0,d=0,p=0,r=0,rp=0;
    baseList.forEach(function(g){ t+=g.total;w+=g.welded;d+=g.done;p+=g.inP;r+=g.rej;rp+=g.repair; });
    return {total:t,welded:w,done:d,inP:p,rej:r,repair:rp,pct:t?Math.round(w/t*100):0};
  }, [baseList]);

  // ── 행 높이 (useMemo로 캐싱, openSet 바뀔 때만 재계산)
  var heights = useMemo(function() {
    return filtered.map(function(g) {
      if (!openSet.has(g.key)) return ITEM_H;
      var rows = Math.ceil(g.joints.length / BUBBLE_COLS) || 1;
      return ITEM_H + BUBBLE_BASE + rows * BUBBLE_H;
    });
  }, [filtered, openSet]);

  // ── 오프셋 누적
  var offsets = useMemo(function() {
    var arr = [0];
    for (var i=0; i<heights.length; i++) arr.push(arr[i] + heights[i]);
    return arr;
  }, [heights]);

  var totalH = offsets[offsets.length-1] || 0;

  // ── 보이는 범위 계산 (scrollTop ref 사용)
  function getVisible() {
    var st = scrollTopRef.current;
    var start = 0, end = filtered.length - 1;
    // 이진 탐색으로 시작 인덱스
    var lo=0, hi=filtered.length-1;
    while (lo < hi) {
      var mid = (lo+hi)>>1;
      if (offsets[mid+1] <= st) lo=mid+1; else hi=mid;
    }
    start = Math.max(0, lo - OVERSCAN);
    // 끝 인덱스
    lo=start; hi=filtered.length-1;
    while (lo < hi) {
      var mid2 = (lo+hi+1)>>1;
      if (offsets[mid2] < st + CONTAINER_H) lo=mid2; else hi=mid2-1;
    }
    end = Math.min(filtered.length-1, lo + OVERSCAN);
    return {start:start, end:end};
  }

  function expandAll() {
    setOpenSet(new Set(filtered.map(function(g){return g.key;})));
  }
  function collapseAll() {
    setOpenSet(new Set());
    scrollTopRef.current = 0;
    if (containerRef.current) containerRef.current.scrollTop = 0;
  }

  var STATUS_FILTERS = [
    ['all','전체'],['done','100%'],['active','진행중'],
    ['pending','미착수'],['reject','불합격'],['repair','Repair']
  ];

  // ── 단일 행 렌더
  function renderItem(g, top, idx) {
    var pct    = g.pct;
    var clr    = pct===100?C.green:pct>50?C.blueL:pct>0?C.gold:C.gray;
    var isOpen = openSet.has(g.key);
    var h_tot  = isOpen ? heights[idx] : ITEM_H;

    return h('div', {
      key: g.key,
      style: {
        position: 'absolute', top: top, left: 4, right: 4,
        height: h_tot,
        background: C.navyL,
        border: '1px solid '+(g.repair>0?C.orange:C.border),
        borderRadius: 10, overflow: 'hidden',
        boxSizing: 'border-box'
      }
    },
      // 헤더
      h('div', {
        onClick: function(){ toggleOpen(g.key); },

            background:C.orange+'25',color:C.orange,border:'1px solid '+C.orange+'50'}},'🔁'+g.repair),

              style:{width:28,height:28,borderRadius:5,flexShrink:0,
                display:'flex',alignItems:'center',justifyContent:'center',
                background:rep?C.orange+'30':(isW?s.bg:C.gray+'20'),
                border:'2px solid '+(rep?C.orange:(isW&&wld?s.color:C.gray))+'70',
                fontSize:8,fontWeight:700,color:rep?C.orange:(isW?s.color:C.gray),
                fontFamily:"'IBM Plex Mono',monospace",cursor:'default'},
              onMouseEnter:function(e){e.currentTarget.style.transform='scale(1.4)';e.currentTarget.style.zIndex='5';},
              onMouseLeave:function(e){e.currentTarget.style.transform='';e.currentTarget.style.zIndex='';}
            }, j.jointNo.replace(/^0+/,'')||j.jointNo);
          })
        ),
        h('div',{style:{display:'flex',gap:8,flexWrap:'wrap'}},
          Object.keys(STATUS).map(function(k){

          }).filter(Boolean)
        )

    );

  // ── 가상 스크롤 핸들러 (setState 없이 ref만 업데이트 후 forceUpdate)

    // KPI
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:12}},

      h(KPI,{label:'용접완료',   value:summary.welded,  color:C.green,  icon:'✅'}),
      h(KPI,{label:'진행중',     value:summary.inP,     color:C.gold,   icon:'🔧'}),

              background:act?'linear-gradient(90deg,'+C.blue+','+C.blueL+')':C.navyL,
              color:act?'#fff':C.grayL,fontWeight:act?700:400}}, m[1]);

      h('input',{value:searchQ,

        style:{flex:'1 1 160px',padding:'7px 12px',background:C.navyL,
          border:'1px solid '+C.border,borderRadius:8,color:C.white,fontSize:12}}),
      STATUS_FILTERS.map(function(f){
        var act=filterSt===f[0];
        return h('button',{key:f[0],
          onClick:function(){ setFilterSt(f[0]); scrollTopRef.current=0; },
          style:{padding:'6px 9px',borderRadius:7,fontSize:11,cursor:'pointer',
            background:act?C.blueL+'30':C.navyL,

        h('button',{onClick:collapseAll,

            borderRadius:6,color:C.grayL,fontSize:11}},'전체 접기')

      : filtered.length===0

            }

                for(var i=vis.start; i<=vis.end && i<filtered.length; i++){

}

// ════ project ════
function ProjectPanel(props) {
  var data          = props.data          || [];
  var projectList   = props.projectList   || [];
  var autoSiteCodes = props.autoSiteCodes || [];
  var projFilter    = props.projFilter;
  var siteFilter    = props.siteFilter;
  var clientFilter  = props.clientFilter;
  var setProjFilter = props.setProjFilter    || function(){};
  var setSiteFilter = props.setSiteFilter    || function(){};
  var setClientFilter = props.setClientFilter|| function(){};
  var clearAll      = props.clearAll         || function(){};

  // ── 로컬 상태
  var lvSt   = useState('client');   var level   = lvSt[0];   var setLevel   = lvSt[1];
  var srchSt = useState('');         var srch    = srchSt[0]; var setSrch    = srchSt[1];

  // 발주처 목록 (localStorage)
  var clientsSt = useState(function(){ return getClientList(); });
  var clients   = clientsSt[0]; var setClientsRaw = clientsSt[1];
  function setClients(list) { setClientsRaw(list); saveClientList(list); }

  // 대공사(Site) 목록 (localStorage)
  var sitesSt  = useState(function(){ return getSiteList(); });
  var sites    = sitesSt[0]; var setSitesRaw = sitesSt[1];
  function setSites(list) { setSitesRaw(list); saveSiteList(list); }

  // 탭 진입 시 최신 데이터 로드
  React.useEffect(function(){
    setClientsRaw(getClientList());
    setSitesRaw(getSiteList());
  }, []);

  // ── 자동으로 데이터에서 Site 감지해서 미등록 Site는 표시
  var autoSites = useMemo(function() {
    var registered = sites.map(function(s){ return s.code; });
    return autoSiteCodes.filter(function(c){ return c !== '__none__' && registered.indexOf(c) < 0; });
  }, [autoSiteCodes, sites]);

  // ── 모달 상태
  var modSt    = useState(null); var modal = modSt[0]; var setModal = modSt[1];
  // modal: {type:'client'|'site', mode:'add'|'edit', data:{...}}
  var formSt   = useState({}); var form = formSt[0]; var setForm = formSt[1];
  function setF(k,v){ setForm(function(p){ return Object.assign({},p,{[k]:v}); }); }

  // ── 통계 계산
  function getProjectStats(proj) {
    var rows = data.filter(function(d){ return d.project===proj && d.weldGubun==='W'; });
    var total  = rows.length;
    var welded = rows.filter(function(d){ return d.fitupDate&&d.visualDate&&d.welder; }).length;
    var ndeReq = rows.filter(function(d){ return d.rtReqNo||d.ptReqNo; }).length;
    var rej    = rows.filter(function(d){ return d.status==='REJECTED'; }).length;
    return { total, welded, ndeReq, rej, pct: total?Math.round(welded/total*100):0 };
  }

  function getSiteStats(siteCode) {
    var siteProjs = projectList.filter(function(p){ return p.siteCode===siteCode; });
    // siteCode 직접 매칭 + project 문자열이 siteCode-로 시작하는 것도 포함
    var wRows = data.filter(function(d){
      if (d.weldGubun !== 'W') return false;
      var p = parseProjectCode(d.project);
      if (p && p.siteCode === siteCode) return true;
      // 업로드 시 보정된 project: 'HSB-MR01. ...' 형태
      if (!p || !p.siteCode) {
        var proj = String(d.project || '');
        if (proj.indexOf(siteCode + '-') === 0) return true;
      }
      return false;
    });
    var total  = wRows.length;
    var welded = wRows.filter(function(d){ return d.fitupDate&&d.visualDate&&d.welder; }).length;
    return { projCount:siteProjs.length, total:total, welded:welded, pct:total?Math.round(welded/total*100):0 };
  }

  // ── 전체 대공사 목록 (등록 + 자동감지)
  var allSites = useMemo(function(){
    var result = sites.slice();
    autoSites.forEach(function(code){
      if (!result.find(function(s){ return s.code===code; })) {
        result.push({ id:'auto_'+code, code:code, name:code+' (자동감지)', clientId:null, desc:'' });
      }
    });
    return result;
  }, [sites, autoSites]);

  // ── 통계 함수 (allSites 이후에 정의)
  function getClientStats(clientId) {
    // 이 발주처에 연결된 sites
    var linkedSites = allSites.filter(function(s){ return s.clientId === clientId; });
    var linkedCodes = linkedSites.map(function(s){ return s.code; });

    // 연결된 사이트가 없고 발주처가 1개뿐이면 미연결 autoSites도 포함
    var effectiveCodes = linkedCodes;
    if (linkedCodes.length === 0 && clients.length === 1) {
      // 모든 autoSites(미연결) 데이터를 이 발주처에 귀속
      effectiveCodes = allSites.map(function(s){ return s.code; });
    }

    var allRows = data.filter(function(d){
      var p = parseProjectCode(d.project);
      return p && effectiveCodes.indexOf(p.siteCode) >= 0 && d.weldGubun === 'W';
    });
    var total  = allRows.length;
    var welded = allRows.filter(function(d){ return d.fitupDate && d.visualDate && d.welder; }).length;
    var projCnt = projectList.filter(function(p){ return effectiveCodes.indexOf(p.siteCode) >= 0; }).length;
    return {
      siteCount: linkedSites.length + (linkedCodes.length===0&&clients.length===1 ? allSites.filter(function(s){return !s.clientId;}).length : 0),
      projCount: projCnt,
      total: total,
      welded: welded,
      pct: total ? Math.round(welded / total * 100) : 0
    };
  }

  // ── 현재 보여줄 대공사 목록 (선택된 발주처 기준)
  var currentSites = useMemo(function(){
    if (clientFilter) {
      var linked = allSites.filter(function(s){ return s.clientId === clientFilter; });
      // 연결된 게 없고 발주처 1개면 미연결 autoSites도 표시
      if (linked.length === 0 && clients.length === 1) {
        return allSites; // 모든 대공사 표시 (연결 안내 포함)
      }
      return linked;
    }
    return allSites;
  }, [allSites, clientFilter, clients]);

  // ── 현재 보여줄 프로젝트 목록
  var currentProjects = useMemo(function(){
    var list = projectList;
    if (siteFilter) list = list.filter(function(p){ return p.siteCode===siteFilter; });
    else if (clientFilter) {
      var siteCodes = currentSites.map(function(s){ return s.code; });
      list = list.filter(function(p){ return siteCodes.indexOf(p.siteCode)>=0; });
    }
    if (srch) {
      var q = srch.toLowerCase();
      list = list.filter(function(p){
        return p.project.toLowerCase().indexOf(q)>=0 || (p.mrCode||'').toLowerCase().indexOf(q)>=0;
      });
    }
    return list;
  }, [projectList, siteFilter, clientFilter, currentSites, srch]);

  // ── 스타일 상수
  var inp = {padding:'8px 11px',background:C.navy,border:'1px solid '+C.border,
    borderRadius:7,color:C.white,fontSize:12,width:'100%'};
  var labelS = {fontSize:10,color:C.grayL,marginBottom:4,fontWeight:600};

  // ── 모달 저장
  function saveModal() {
    if (modal.type==='client') {
      if (!form.name) { alert('발주처명을 입력하세요'); return; }
      var newClient = Object.assign({id: modal.mode==='edit'?modal.data.id:String(Date.now())}, form);
      var list = modal.mode==='edit'
        ? clients.map(function(c){ return c.id===newClient.id?newClient:c; })
        : clients.concat([newClient]);
      setClients(list);
    } else { // site
      if (!form.code) { alert('대공사 코드를 입력하세요'); return; }
      var newSite = Object.assign({id: modal.mode==='edit'?modal.data.id:String(Date.now())}, form);
      var list2 = modal.mode==='edit'
        ? sites.map(function(s){ return s.id===newSite.id?newSite:s; })
        : sites.concat([newSite]);
      setSites(list2);
    }
    setModal(null); setForm({});
  }

  function deleteItem(type, id) {
    if (!confirm('삭제하시겠습니까?')) return;
    if (type==='client') setClients(clients.filter(function(c){ return c.id!==id; }));
    else setSites(sites.filter(function(s){ return s.id!==id; }));
  }

  // ── 브레드크럼
  var selClientName = clientFilter
    ? (clients.find(function(c){ return c.id===clientFilter; })||{name:clientFilter}).name : null;
  var selSiteName   = siteFilter || null;

  // ── 공통 카드 배경
  var cardS = {background:C.navyL,border:'1px solid '+C.border,borderRadius:10,
    padding:'14px 16px',transition:'all .15s'};

  function pctBar(pct, clr) {
    return h('div',{style:{display:'flex',alignItems:'center',gap:8,flex:'0 0 150px'}},
      h('div',{style:{flex:1,height:5,background:C.border,borderRadius:3,overflow:'hidden'}},
        h('div',{style:{width:pct+'%',height:'100%',background:clr,borderRadius:3}})),
      h('span',{style:{fontSize:11,fontWeight:700,color:clr,minWidth:32,textAlign:'right',
        fontFamily:"'IBM Plex Mono',monospace"}},pct+'%'));
  }

  function statBox(val, label, color) {
    return h('div',{style:{textAlign:'center',minWidth:44}},
      h('div',{style:{fontSize:15,fontWeight:700,color:color||C.white}},val),
      h('div',{style:{fontSize:9,color:C.gray,marginTop:1}},label));
  }

  // ════════════════════════════════════════════════════════════════
  return h('div',{className:'fade'},

    // ── 모달
    modal && h('div',{style:{position:'fixed',inset:0,background:'#000000b0',
      zIndex:500,display:'flex',alignItems:'center',justifyContent:'center'},
      onClick:function(e){if(e.target===e.currentTarget)setModal(null);}},
      h('div',{style:{background:C.navyL,border:'1px solid '+C.border,borderRadius:14,
        padding:24,width:400,boxShadow:'0 16px 48px #00000080'}},
        h('div',{style:{fontSize:15,fontWeight:700,color:C.white,marginBottom:18}},
          modal.mode==='add'
            ? (modal.type==='client'?'+ 발주처 추가':'+ 대공사 추가')
            : (modal.type==='client'?'✏ 발주처 수정':'✏ 대공사 수정')),

        modal.type==='client' && h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          h('div',null, h('div',{style:labelS},'발주처명 *'),
            h('input',{value:form.name||'',onChange:function(e){setF('name',e.target.value);},style:inp})),
          h('div',null, h('div',{style:labelS},'약자/코드'),
            h('input',{value:form.code||'',onChange:function(e){setF('code',e.target.value);},style:inp,placeholder:'예: HDO'})),
          h('div',null, h('div',{style:labelS},'담당자'),
            h('input',{value:form.manager||'',onChange:function(e){setF('manager',e.target.value);},style:inp})),
          h('div',null, h('div',{style:labelS},'연락처'),
            h('input',{value:form.contact||'',onChange:function(e){setF('contact',e.target.value);},style:inp})),
          h('div',null, h('div',{style:labelS},'비고'),
            h('input',{value:form.desc||'',onChange:function(e){setF('desc',e.target.value);},style:inp}))
        ),

        modal.type==='site' && h('div',{style:{display:'flex',flexDirection:'column',gap:10}},
          h('div',null, h('div',{style:labelS},'대공사 코드 * (예: TA, HSB)'),
            h('input',{value:form.code||'',onChange:function(e){setF('code',e.target.value);},style:inp,placeholder:'HSB'})),
          h('div',null, h('div',{style:labelS},'대공사명'),
            h('input',{value:form.name||'',onChange:function(e){setF('name',e.target.value);},style:inp,placeholder:'1플랜트 TA'})),
          h('div',null, h('div',{style:labelS},'발주처'),
            h('select',{value:form.clientId||'',onChange:function(e){setF('clientId',e.target.value);},
              style:Object.assign({},inp,{padding:'8px 10px'})},
              h('option',{value:''},'-- 선택 --'),
              clients.map(function(c){ return h('option',{key:c.id,value:c.id},c.name); })
            )),
          h('div',null, h('div',{style:labelS},'비고'),
            h('input',{value:form.desc||'',onChange:function(e){setF('desc',e.target.value);},style:inp}))
        ),

        h('div',{style:{display:'flex',gap:8,marginTop:20,justifyContent:'flex-end'}},
          h('button',{onClick:function(){setModal(null);setForm({});},
            style:{padding:'8px 18px',background:'none',border:'1px solid '+C.border,
              borderRadius:7,color:C.grayL,cursor:'pointer'}},'취소'),
          h('button',{onClick:saveModal,
            style:{padding:'8px 20px',background:'linear-gradient(90deg,'+C.blue+','+C.blueL+')',
              border:'none',borderRadius:7,color:'#fff',fontWeight:700,cursor:'pointer'}},
            modal.mode==='add'?'추가':'저장')
        )
      )
    ),

// RepairPanel — Repair 시트 조인트 관리
// ════════════════════════════════════════════════════════════════════════

// ════ repair ════
function RepairPanel(props) {
  var repairData = props.repairData || [];
  var data       = props.data || [];
  var setData    = props.setData || function(){};

  var srchSt = useState(''); var srch = srchSt[0]; var setSrch = srchSt[1];
  var cfSt   = useState({}); var colF = cfSt[0];   var setColF = cfSt[1];

  // 고유값
  var colVals = useMemo(function() {
    var res = {};
    ['tmpNo','isoNo','weldType'].forEach(function(f){
      var seen={}, vals=[];
      repairData.forEach(function(d){ var v=d[f]; var k=String(v==null?'':v);
        if(!seen[k]){seen[k]=1;vals.push(v);} });
      res[f] = vals.sort(function(a,b){return String(a||'').localeCompare(String(b||''));});
    });
    return res;
  }, [repairData]);

  function setColFilter(f, s) {
    setColF(function(prev){ var u=Object.assign({},prev);
      if(!s||s.size===0) delete u[f]; else u[f]=s; return u; });
  }

  var filtered = useMemo(function() {
    var q = srch.toLowerCase();
    var cfKeys = Object.keys(colF);
    return repairData.filter(function(d) {
      if (q) {
        var hit = ['isoNo','jointNo','tmpNo','rtReqNo'].some(function(f){
          return String(d[f]||'').toLowerCase().indexOf(q) >= 0;
        });
        if (!hit) return false;
      }
      for (var i=0;i<cfKeys.length;i++) {
        var inc = colF[cfKeys[i]];
        if (inc && inc.size > 0 && !inc.has(d[cfKeys[i]])) return false;
      }
      return true;
    });
  }, [repairData, srch, colF]);

  // 전체 로그에서 이 조인트 찾기
  function findMain(r) {
    return data.find(function(d){ return d.isoNo===r.isoNo && d.jointNo===r.jointNo; });
  }

  var thS2 = { padding:'7px 10px', background:'#0C1B36', color:'#8BAED4',
    fontWeight:600, fontSize:11, whiteSpace:'nowrap',
    borderBottom:'1px solid rgba(30,48,96,.5)', position:'sticky', top:0, zIndex:5 };
  var tdS2 = { padding:'7px 10px', borderBottom:'1px solid rgba(30,48,96,.2)', fontSize:11 };

  return h('div', { className:'fade' },
    // KPI
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:16}},
      h(KPI,{label:'전체 Repair 건',  value:repairData.length,                            color:C.orange, icon:'🔁'}),
      h(KPI,{label:'RT Repair',        value:repairData.filter(function(r){return r.rtReqNo;}).length,  color:C.blueL, icon:'📋'}),
      h(KPI,{label:'2차 RT',           value:repairData.filter(function(r){return r.rtReqNo2;}).length, color:C.gold,  icon:'🔄'}),
      h(KPI,{label:'전체 로그 연결',   value:repairData.filter(function(r){return !!findMain(r);}).length, color:C.green, icon:'✅'})
    ),

    // 툴바
    h('div',{style:{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap',alignItems:'center'}},
      h('input',{value:srch,onChange:function(e){setSrch(e.target.value);},
        placeholder:'🔍 ISO No. / Joint No. / 임시번호 검색...',
        style:{flex:'1 1 200px',padding:'8px 12px',background:C.navyL,
          border:'1px solid '+C.border,borderRadius:8,color:C.white,fontSize:12}}),
      h('span',{style:{fontSize:11,color:C.gray}},filtered.length+'/'+repairData.length+'건')
    ),
    h('div',{style:{display:'flex',gap:6,marginBottom:10,flexWrap:'wrap',alignItems:'center'}},
      h('span',{style:{fontSize:11,color:C.gray,fontWeight:600}},'🔽 열 필터:'),
      [['tmpNo','임시번호'],['isoNo','ISO No.'],['weldType','용접Type']].map(function(pair){
        return h(ColFilterDropdown,{key:pair[0],field:pair[0],label:pair[1],
          values:colVals[pair[0]]||[],selected:colF[pair[0]]||new Set(),
          onChange:function(s){setColFilter(pair[0],s);}});
      }),

function UploadPanel(props) {
  var setData = props.setData;

  var dragState  = useState(false);  var drag  = dragState[0];  var setDrag  = dragState[1];
  var filesState = useState([]);     var files = filesState[0]; var setFiles = filesState[1];
  var busyState  = useState(false);  var busy  = busyState[0];  var setBusy  = busyState[1];
  var logState   = useState([]);     var log   = logState[0];   var setLog   = logState[1];
  var ref = useRef(null);

  function addLog(msg, color) {
    setLog(function(prev) {
      return prev.concat([{ msg: msg, color: color || C.grayL, t: new Date().toLocaleTimeString() }]);
    });
  }

  function onDrop(e) {
    e.preventDefault(); setDrag(false);
    var newFiles = Array.from(e.dataTransfer.files).filter(function(f) {
      return /\.(pdf|xlsx|png|jpg|jpeg)$/i.test(f.name);
    });
    setFiles(function(prev) { return prev.concat(newFiles); });
  }

  function process() {
    if (!files.length || busy) return;
    setBusy(true); setLog([]);

    var idx = 0;
    function processNext() {
      if (idx >= files.length) {
        addLog('── 모든 파일 처리 완료 ──', C.cyan);
        setBusy(false); setFiles([]);
        return;
      }
      var f = files[idx++];
      addLog('📂 ' + f.name, C.blueL);

      var reader = new FileReader();
      reader.onload = function() {
        var b64 = reader.result.split(',')[1];
        var ext = f.name.split('.').pop().toLowerCase();
        var mt = ext === 'pdf' ? 'application/pdf' : ext === 'png' ? 'image/png' : 'image/jpeg';
        addLog('  → Claude AI 분석 중...', C.cyan);

        var payload = {
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: [
              {
                type: mt === 'application/pdf' ? 'document' : 'image',
                source: { type: 'base64', media_type: mt, data: b64 }
              },
              {
                type: 'text',
                text: '이 ISO 배관 도면을 분석해서 JSON만 반환 (마크다운 없이):\n{"isoNo":"","lineNo":"","rev":"","project":"","pkg":"","area":"","matClass":"","mat1":"","mat2":"","sch":160,"insulType":"","insulThk":30,"operP":null,"operT":null,"desP":null,"desT":null,"testP":null,"medium":"","ndeRT":"-","ndePT":"-","pwht":"N","paintCode":"I","joints":[{"jointNo":"001","weldType":"SW","shopField":"F","size":1.00,"remark":""}]}'
              }
            ]
          }]
        };

        fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }).then(function(r) { return r.json(); }).then(function(dat) {
          var raw = (dat.content || []).map(function(c) { return c.text || ''; }).join('');
          var clean = raw.replace(/```json|```/g, '').trim();
          var parsed = null;
          try { parsed = JSON.parse(clean); } catch(e) { parsed = null; }

          if (parsed && parsed.isoNo) {
            addLog('  ✅ ' + parsed.isoNo + ' — 조인트 ' + (parsed.joints || []).length + '개', C.green);
            var base = Date.now();
            var newRows = (parsed.joints || []).map(function(j, i2) {
              return {
                id: base + i2,
                area: parsed.area || '', tmpNo: '', project: parsed.project || '',
                pkg: parsed.pkg || '', lineNo: parsed.lineNo || '', isoNo: parsed.isoNo || '',
                rev: parsed.rev || '0A', jointNo: j.jointNo || '', system: 'P',
                weldType: j.weldType || 'SW', shopField: j.shopField || 'F',
                size: parseFloat(j.size) || 1.0, sch: parseInt(parsed.sch) || 160, thick: null,
                matClass: parsed.matClass || '', mat1: parsed.mat1 || '', mat2: parsed.mat2 || '',
                fitupDate:'', visualDate:'', welder:'',
                ndeRT: parsed.ndeRT || '-', ndePT: parsed.ndePT || '-', pwht: parsed.pwht || 'N',
                rtReqNo:'', rtReqDate:'', rtRptNo:'', rtRptDate:'',
                ptReqNo:'', ptReqDate:'', ptRptNo:'', ptRptDate:'',
                operP: parsed.operP, operT: parsed.operT, desP: parsed.desP,
                desT: parsed.desT, testP: parsed.testP, medium: parsed.medium || '',
                insulType: parsed.insulType || '', insulThk: parsed.insulThk || null,
                paintCode: parsed.paintCode || 'I', suptType: '-', remark: j.remark || '',
                weldGubun: (['BT','Others','VT','Thread'].indexOf(j.weldType) >= 0) ? '제외' : 'W',
                status: 'PENDING'
              };
            });
            if (newRows.length) {
              setData(function(prev) { return prev.concat(newRows); });
            }
          } else {
            addLog('  ⚠ 파싱 실패 — 직접 입력 필요', C.orange);
          }
          processNext();
        }).catch(function(e) {
          addLog('  ❌ ' + e.message, C.red);
          processNext();
        });
      };
      reader.onerror = function() { addLog('  ❌ 파일 읽기 실패', C.red); processNext(); };
      reader.readAsDataURL(f);
    }
    processNext();
  }

  return h('div', { className:'fade', style: { maxWidth:740 } },
    h('h2', { style: { fontSize:17, fontWeight:700, marginBottom:16 } }, '도면 업로드 & AI 자동 분석'),

    h('div', {
      onDragOver: function(e) { e.preventDefault(); setDrag(true); },
      onDragLeave: function() { setDrag(false); },
      onDrop: onDrop,
      onClick: function() { ref.current && ref.current.click(); },
      style: {
        border: '2px dashed ' + (drag ? C.cyan : C.border),
        borderRadius:14, padding:'44px 32px', textAlign:'center', cursor:'pointer',
        background: drag ? C.cyan + '08' : C.navyL, transition:'all .2s', marginBottom:14
      }
    },
      h('input', {
        ref: ref, type:'file', multiple:true,
        accept: '.pdf,.xlsx,.png,.jpg,.jpeg',
        style: { display:'none' },
        onChange: function(e) {
          setFiles(function(prev) { return prev.concat(Array.from(e.target.files)); });
        }
      }),
      h('div', { style: { fontSize:36, marginBottom:8 } }, '📂'),
      h('div', { style: { fontSize:14, fontWeight:600, color: drag ? C.cyan : C.white, marginBottom:4 } },
        drag ? '여기에 놓으세요' : 'ISO 도면 파일을 드래그하거나 클릭'),
      h('div', { style: { fontSize:11, color:C.gray } }, 'PDF · Excel(.xlsx) · 이미지(.png .jpg) 지원')
    ),

    files.length > 0 && h('div', { style: { marginBottom:12 } },
      h('div', { style: { fontSize:11, color:C.gray, marginBottom:6 } }, '대기 파일 (' + files.length + '개)'),
      files.map(function(f, i) {
        return h('div', {
          key: i,
          style: {
            display:'flex', alignItems:'center', justifyContent:'space-between',
            background:C.navyL, border:'1px solid ' + C.border,
            borderRadius:7, padding:'7px 12px', marginBottom:4
          }
        },
          h('div', { style: { display:'flex', alignItems:'center', gap:8 } },
            h('span', { style: { color:C.blueL } }, '📄'),
            h('span', { style: { fontSize:12, color:C.white } }, f.name),
            h('span', { style: { fontSize:10, color:C.gray } }, '(' + (f.size/1024).toFixed(1) + ' KB)')
          ),
          h('button', {
            onClick: function(e) {
              e.stopPropagation();
              setFiles(function(prev) { return prev.filter(function(_, j) { return j !== i; }); });
            },
            style: { background:'none', border:'none', color:C.gray, fontSize:14 }
          }, '✕')
        );
      })
    ),

    h('button', {
      onClick: process,
      disabled: !files.length || busy,
      style: {

    ),

    log.length > 0 && h('div', {
      style: { marginTop:14, background:C.navyL, border:'1px solid '+C.border, borderRadius:10, padding:14, maxHeight:220, overflowY:'auto' }

  var WELD_EXCLUDE = {Others:1,Thread:1,BT:1,"Sup't":1,'-':1,Sup:1,VT:1,"SUP'T":1};

  function fmtDate(v) {
    if (!v) return '';
    if (v instanceof Date || (typeof v === 'object' && v.getFullYear)) {
      var d = v;
      return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }
    // SheetJS 날짜 숫자 처리
    if (typeof v === 'number' && v > 40000 && v < 60000) {
      var ms = Math.round((v - 25569) * 86400 * 1000);
      var dd = new Date(ms);
      return dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');
    }
    var s = String(v);
    // 이미 날짜 형식이면 그대로
    if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);

    // 숫자
